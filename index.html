          <input type="file" id="complaintPhoto" accept="image/*" style="display:none">
        </label>
        ${imgBlock}${analysisBlock}
        <div class="btn-row" style="margin-top:1rem">
          <button class="btn-secondary" onclick="prevStep()">← Back</button>
          <button class="btn-secondary" onclick="skipPhoto()">Skip — no photo</button>
          <button class="btn-primary" onclick="savePhoto()">Continue →</button>
        </div>
      </div>`;
    }

    function renderHistory() {
      state.pathwayKey = engine.detectPathway(state.complaint, state.imageAnalysis, state);
      const pathway = GP_PATHWAYS[state.pathwayKey] || GP_PATHWAYS.default;
      const ctx = { gender: state.gender, age: parseInt(state.age) || 0 };
      const qs = pathway.questions.filter(q => !q.showIf || q.showIf(ctx)).map(q => {
        const val = state.historyAnswers[q.id] || '';
        if (q.type === 'radio') {
          return `<div class="question-block"><h3>${esc(q.text)}</h3><div class="radio-group">
            ${q.options.map(o => `<label><input type="radio" name="${q.id}" value="${esc(o)}" ${val===o?'checked':''}> ${esc(o)}</label>`).join('')}
          </div></div>`;
        }
        return `<div class="question-block"><h3>${esc(q.text)}</h3><textarea id="hist_${q.id}" placeholder="Your answer…">${esc(val)}</textarea></div>`;
      }).join('');
      return `<div class="card">
        <div class="step-label">Step 4 · Clinical history</div>
        ${gpMessage(`Based on your complaint, I'll ask focused questions about ${esc(pathway.category.toLowerCase())} — including red-flag screening per NICE CKS.`)}
        <h2>Focused history</h2>${qs}
        <div class="btn-row"><button class="btn-secondary" onclick="prevStep()">← Back</button><button class="btn-primary" onclick="saveHistory()">Continue →</button></div>
      </div>`;
    }

    function renderBackground() {
      const customConds = state.customComorbidities || [];
      const selected = state.comorbidities || [];
      const noneSelected = selected.includes('None');

      const categoryBlocks = Object.entries(COMORBIDITY_CATEGORIES).map(([cat, items]) => {
        const chips = items.map(c => {
          const isSel = selected.includes(c) || customConds.includes(c);
          return `<span class="chip ${isSel ? 'selected' : ''}" data-comorbid="${esc(c)}" data-cat="${esc(cat)}">${esc(c)}</span>`;
        }).join('');
        return `<div class="comorbid-category">
          <div class="comorbid-category-title">${esc(cat)}</div>
          <div class="comorbid-grid">${chips}</div>
        </div>`;
      }).join('');

      const customBlock = customConds.length ? `<div class="comorbid-category">
        <div class="comorbid-category-title">Custom / patient-reported</div>
        <div class="chip-group">${customConds.map(c =>
          `<span class="chip custom-chip selected" data-custom-comorbid="${esc(c)}">${esc(c)}<button class="chip-remove" data-remove-custom="${esc(c)}" aria-label="Remove">&times;</button></span>`
        ).join('')}</div>
      </div>` : '';

      const noneChip = `<span class="chip ${noneSelected ? 'selected' : ''}" data-comorbid="None">None of these</span>`;

      const selectedCount = selected.filter(c => c !== 'None').length + customConds.length;

      const customForm = state._showAddCustom ? `<div class="add-custom-form">
        <div>
          <label style="font-size:0.78rem;color:var(--muted)">Condition name</label>
          <input type="text" id="newComorbidName" placeholder="e.g. Sickle cell disease" maxlength="80">
        </div>
        <div>
          <label style="font-size:0.78rem;color:var(--muted)">Medication (if any)</label>
          <input type="text" id="newComorbidMed" placeholder="e.g. Hydroxycarbamide" maxlength="120">
        </div>
        <button class="btn-primary" style="align-self:end;padding:0.55rem 1rem;font-size:0.85rem" onclick="addCustomComorbid()">Add</button>
      </div>` : '';

      return `<div class="card">
        <div class="step-label">Step 5 · Medical background</div>
        ${gpMessage(`Tap any condition that applies. ${state.complaint ? 'I\u2019ll cross-reference these against your current presentation to spot drug\u2013disease interactions, red flags, and tailored treatment thresholds.' : 'These help me check drug interactions and tailor recommendations safely.'}`)}
        <h2>Past history & medications
          <span class="selected-count">${selectedCount} selected</span>
        </h2>
        <div class="form-group">
          <label>Existing / co-morbid conditions
            <span class="optional" style="color:var(--muted);font-weight:400;margin-left:0.4rem">— ${Object.values(COMORBIDITY_CATEGORIES).flat().length} curated, plus custom entry</span>
          </label>
          <div class="chip-group" style="margin-bottom:0.75rem">${noneChip}</div>
          <div id="comorbidChips">${categoryBlocks}${customBlock}</div>
          <div style="margin-top:0.85rem;display:flex;align-items:center;gap:0.5rem;flex-wrap:wrap">
            <button class="add-custom-btn" onclick="toggleCustomForm()">
              <span style="font-size:1.05rem;line-height:1">+</span> Add custom condition
            </button>
            <span style="color:var(--muted);font-size:0.78rem">For rare conditions, prior diagnoses, or anything not listed above</span>
          </div>
          ${customForm}
        </div>
        <div class="form-group"><label>Current medications & doses</label>
          <textarea id="medications" placeholder="e.g. Ramipril 5 mg OD, Atorvastatin 40 mg ON">${esc(state.medications)}</textarea>
          <span style="font-size:0.76rem;color:var(--muted)">Tip: include strength + frequency — I check interactions and adjust for renal/hepatic function.</span>
        </div>
        <div class="form-group"><label>Recent medication</label>
          <div class="row">
            <div style="flex:1"><input type="text" id="recentMedication" placeholder="e.g. Pregabalin" value="${esc(state.recentMedication)}"></div>
            <div style="flex:0 0 140px"><input type="number" id="recentMedicationDays" min="1" placeholder="Days ago" value="${esc(state.recentMedicationDays)}" style="width:100%"></div>
          </div>
          <span style="font-size:0.76rem;color:var(--muted)">If your symptom started after starting a new medicine, note it here. This helps me check if the medication could be the cause.</span>
        </div>
        <div class="form-group"><label>Allergies & reactions</label>
          <input type="text" id="allergies" placeholder="e.g. Penicillin — rash; Ibuprofen — asthma. Or NKDA" value="${esc(state.allergies)}"></div>
        <div class="row">
          <div class="form-group"><label>Smoking</label><select id="smoking">
            <option value="">Select…</option>
            ${['Never','Ex-smoker','Current <10/day','Current 10\u201320/day','Current >20/day','Vaping / e-cigarette'].map(s => `<option ${state.smoking===s?'selected':''}>${s}</option>`).join('')}
          </select></div>
          <div class="form-group"><label>Alcohol</label><select id="alcohol">
            <option value="">Select…</option>
            ${['None/rare','Within limits (\u226414 u/wk)','Above limits (14\u201350 u/wk)','Harmful (>50 u/wk)','Dependent / in recovery'].map(s => `<option ${state.alcohol===s?'selected':''}>${s}</option>`).join('')}
          </select></div>
        </div>
        <div class="row">
          <div class="form-group"><label>Pregnancy / breastfeeding</label><select id="pregStatus">
            <option value="">N/A or not applicable</option>
            ${['Pregnant','Trying to conceive','Breastfeeding','Postnatal (<12 months)','Taking combined oral contraception'].map(s => `<option ${state.pregStatus===s?'selected':''}>${s}</option>`).join('')}
          </select></div>
          <div class="form-group"><label>Occupation / driving status</label><input type="text" id="occupation" placeholder="e.g. HGV driver, school teacher" value="${esc(state.occupation||'')}"></div>
        </div>
        <div class="form-group"><label>Family history (1st degree relatives)</label>
          <input type="text" id="familyHistory" placeholder="e.g. Father \u2014 MI at 55; Mother \u2014 breast cancer 50" value="${esc(state.familyHistory||'')}"></div>
        <div class="btn-row"><button class="btn-secondary" onclick="prevStep()">\u2190 Back</button><button class="btn-primary" onclick="saveBackground()">Continue \u2192</button></div>
      </div>`;
    }

    function renderReview() {
      return `<div class="card"><div class="step-label">Step 6 · AI review</div>
        ${gpMessage(`Thank you${state.name ? ', ' + esc(state.name.split(' ')[0]) : ''}. I'm analysing your consultation now…`)}
        <p style="color:var(--muted)">Loading assessment…</p>
        <div class="btn-row"><button class="btn-secondary" onclick="prevStep()">← Back</button></div>
      </div>`;
    }

      const urgClass = (r.urgency||'routine').toLowerCase().replace(/\s+/g,'-');
      const urgColor = urgClass === 'emergency' ? 'var(--danger)' : urgClass === 'urgent' ? 'var(--warning)' : 'var(--success)';
      return `<div class="result-panel ai-panel" style="border-left:3px solid #a78bfa;background:rgba(167,139,250,0.06)">
        <h3 style="color:#a78bfa">🧠 AI-powered assessment (GPT-4o-mini)</h3>
        <p style="font-size:0.78rem;color:var(--muted);margin-bottom:0.75rem">Generated via GitHub Models — always verify against clinical judgment.</p>
        <div style="display:flex;gap:0.75rem;align-items:center;margin-bottom:0.75rem;flex-wrap:wrap">
          <span class="diagnosis-badge" style="background:rgba(167,139,250,0.15);color:#c4b5fd">${esc(r.primary)}</span>
          <span style="font-size:0.85rem;color:${urgColor};font-weight:600">${esc(r.urgency||'Routine')}</span>
          <span style="font-size:0.82rem;color:var(--muted)">Confidence: ${r.confidence || 'N/A'}%</span>
        </div>
        ${r.red_flags?.length ? `<div style="margin-bottom:0.75rem"><strong style="color:var(--danger);font-size:0.84rem">🚩 Red flags</strong><ul style="margin:0.3rem 0 0 1.2rem;font-size:0.84rem;color:var(--danger)">${r.red_flags.map(f => `<li>${esc(f)}</li>`).join('')}</ul></div>` : ''}
        ${r.differentials?.length ? `<div style="margin-bottom:0.75rem"><strong style="font-size:0.84rem">Differentials</strong><div style="margin-top:0.3rem">${r.differentials.map(d => `<span class="diff-badge">${esc(d)}</span>`).join('')}</div></div>` : ''}
        ${r.investigations?.length ? `<div style="margin-bottom:0.75rem"><strong style="font-size:0.84rem">Recommended investigations</strong><ul style="margin:0.3rem 0 0 1.2rem;font-size:0.84rem;color:var(--muted)">${r.investigations.map(t => `<li>${esc(t)}</li>`).join('')}</ul></div>` : ''}
        ${r.management ? `<div style="margin-bottom:0.75rem"><strong style="font-size:0.84rem">Management</strong><p style="font-size:0.84rem;color:var(--muted);margin-top:0.3rem">${esc(r.management)}</p></div>` : ''}
        ${r.guideline ? `<p style="font-size:0.78rem;color:var(--muted);margin-top:0.5rem">📚 ${esc(r.guideline)}</p>` : ''}
      </div>`;
    }

    async function triggerGeminiDiagnosis() {
      const aiBtn = document.getElementById('geminiBtn');
      const aiContainer = document.getElementById('aiResultContainer');
      if (aiBtn) { aiBtn.disabled = true; aiBtn.textContent = '🧠 Analysing with GitHub Models…'; }
      if (aiContainer) aiContainer.innerHTML = '<p style="color:var(--muted);font-size:0.84rem">Contacting GitHub Models API…</p>';
      try {
        const result = await diagnoseWithGitHubModels(state);
        state.aiResult = result;
        if (aiContainer) aiContainer.innerHTML = renderAiResult(result);
      } catch (e) {
        if (aiContainer) aiContainer.innerHTML = `<div class="red-flag" style="background:rgba(248,113,113,0.08);border-color:rgba(248,113,113,0.3);color:var(--danger)"><strong>AI unavailable</strong><br>${esc(e.message || 'Check your token and internet connection.')}</div>`;
      } finally {
        if (aiBtn) { aiBtn.disabled = false; aiBtn.textContent = '🧠 Get AI-powered second opinion'; }
      }
    }

    async function triggerDrugLookup() {
      const container = document.getElementById('drugLookupContainer');
      if (!container) return;
      const medText = state.medications || '';
      if (!medText) { container.innerHTML = '<p style="color:var(--muted);font-size:0.84rem">No medications entered.</p>'; return; }
      container.innerHTML = '<p style="color:var(--muted);font-size:0.84rem">Looking up drugs on OpenFDA…</p>';
      const drugNames = medText.split(/[,;]+/).map(s => s.trim().split(/\s+/)[0]).filter(Boolean);
      const results = [];
      for (const name of drugNames.slice(0, 5)) {
        const info = await lookupDrugOpenFDA(name);
        if (info) results.push(info);
      }
      if (results.length) {
        container.innerHTML = `<div style="background:rgba(45,212,191,0.06);border-left:3px solid var(--primary);padding:0.75rem;border-radius:8px;margin-top:0.5rem">
          <h4 style="font-size:0.84rem;color:var(--primary);margin-bottom:0.5rem">💊 Live drug info (OpenFDA)</h4>
          ${results.map(r => `<div style="margin-bottom:0.5rem;font-size:0.82rem"><strong>${esc(r.name)}</strong>${r.purpose ? '<br>Purpose: ' + esc(r.purpose) : ''}${r.warnings ? '<br><span style="color:var(--warning)">⚠️ ' + esc(r.warnings) + '</span>' : ''}${r.interactions ? '<br><span style="color:var(--danger)">⚠️ ' + esc(r.interactions) + '</span>' : ''}</div>`).join('')}
        </div>`;
      } else {
        container.innerHTML = '<p style="color:var(--muted);font-size:0.82rem">No drug data found on OpenFDA.</p>';
      }
    }

    async function renderReviewAsync() {
      const a = await runAnalysis();
      const dx = a.diagnosis;
      const refHtml = renderReferrals(a.referrals);
      const allConds = [...(state.comorbidities || []), ...((state.customComorbidities || []).map(c => c + ' (custom)'))].filter(c => c !== 'None');
      const condChips = allConds.length
        ? allConds.map(c => `<span class="diff-badge">${esc(c)}</span>`).join('')
        : '<span style="color:var(--muted);font-size:0.82rem">None recorded</span>';
      const pathwayStats = `<div class="pathway-stats">
        <span class="pathway-stat">Category: ${esc(a.pathway.category)}</span>
        <span class="pathway-stat">${a.scores.length} pathway${a.scores.length === 1 ? '' : 's'} matched</span>
        ${state.imageAnalysis ? '<span class="pathway-stat">📷 Image analysed</span>' : ''}
        ${state.parsedReports.length ? `<span class="pathway-stat">📄 ${state.parsedReports.length} report(s)</span>` : ''}
      </div>`;
      const aiSection = state._aiEnabled && state._apiKey
        ? `<div style="margin-top:1.25rem;padding-top:1rem;border-top:1px solid var(--border)">
            <h3 style="font-size:1rem;margin-bottom:0.75rem;color:#a78bfa">🧠 AI-powered second opinion</h3>
            <p style="font-size:0.84rem;color:var(--muted);margin-bottom:0.75rem">Send this consultation to GPT-4o-mini (via GitHub Models) for an LLM-generated assessment alongside the local pathway engine.</p>
            <div id="aiResultContainer"></div>
            <button id="geminiBtn" class="btn-secondary" onclick="triggerGeminiDiagnosis()" style="border-color:#a78bfa;color:#a78bfa">🧠 Get AI-powered second opinion</button>
          </div>` : '';
      const drugSection = state._aiEnabled && state._apiKey && (state.medications || state.recentMedication)
        ? `<div style="margin-top:0.75rem">
            <button class="btn-secondary" onclick="triggerDrugLookup()" style="font-size:0.84rem">💊 Look up medications on OpenFDA</button>
            <div id="drugLookupContainer"></div>
          </div>` : '';
      document.getElementById('stepContainer').innerHTML = `<div class="card">
        <div class="step-label">Step 6 · AI review</div>
        ${gpMessage(`Thank you${state.name ? ', ' + esc(state.name.split(' ')[0]) : ''}. Based on your history${state.imageAnalysis ? ', photo analysis,' : ''} and MRCGP clinical pathways, here is my working assessment.`)}
        ${renderReasoning(a.reasoningChain)}
        <ul class="summary-list">
          <li><strong>Patient:</strong> ${esc(state.name||'Anonymous')}, ${esc(formatAge(state.age))}, ${esc(state.gender)}${state.pregStatus ? ' · ' + esc(state.pregStatus) : ''}</li>
          <li><strong>Complaint:</strong> ${esc(state.complaint)}</li>
          <li><strong>Duration:</strong> ${esc(state.duration)} ${esc(state.durationUnit)}</li>
          <li><strong>Allergies:</strong> ${esc(state.allergies || 'NKDA')}</li>
          <li><strong>Co-morbidities:</strong><br>${condChips}</li>
          <li><strong>Active pathway:</strong> ${esc(a.pathwayKey.replace(/_/g,' '))} ${pathwayStats}</li>
        </ul>
        ${refHtml}
        <div class="result-panel">
          <h3>🔍 Provisional diagnosis</h3>
          <span class="diagnosis-badge">${esc(dx.primary)}</span>
          <div class="confidence"><div class="confidence-fill" style="width:${dx.confidence}%"></div></div>
          <p style="font-size:0.82rem;color:var(--muted)">Confidence: ${dx.confidence}%</p>
          <p style="margin-top:0.5rem;font-size:0.86rem"><strong>Differentials:</strong></p>
          ${(dx.differentials||[]).slice(0,6).map(d => `<span class="diff-badge">${esc(d)}</span>`).join('')}
        </div>
        <h2 style="margin-top:1rem">Recommended investigations</h2>
        <p style="font-size:0.84rem;color:var(--muted);margin-bottom:0.75rem">Upload results on the next step if available.</p>
        <ul class="summary-list">${a.tests.map(t => `<li>${esc(t)}</li>`).join('')}</ul>
        ${aiSection}
        ${drugSection}
        <div class="btn-row"><button class="btn-secondary" onclick="prevStep()">← Back</button><button class="btn-primary" onclick="nextStep()">Proceed to investigations →</button></div>
      </div>`;
      attachListeners();
    }

    function renderInvestigations() {
      const testsHtml = (state.recommendedTests||[]).map((test, i) => {
        const up = state.uploadedTests[test];
        const man = state.manualLabs[test];
        return `<div class="test-card ${up?'uploaded':'recommended'}">
          <div class="test-info"><h4>${esc(test)}</h4>
            <p>${up ? '✓ Uploaded: '+esc(up.name) : man ? '✓ Manual entry' : 'Upload or enter result'}</p></div>
          <label class="upload-zone ${up?'has-file':''}" style="padding:0.5rem 1rem;font-size:0.8rem">
            📎 Upload<input type="file" accept=".pdf,.jpg,.jpeg,.png,.txt,.doc,.docx" style="display:none" data-test="${esc(test)}" class="test-upload">
          </label>
        </div>
        <div class="form-group"><input type="text" placeholder="Or enter result manually" data-manual-test="${esc(test)}" value="${esc(man||'')}" class="manual-lab"></div>`;
      }).join('');

      return `<div class="card">
        <div class="step-label">Step 7 · Investigations</div>
        ${gpMessage("Upload lab reports, MRI, CT, or X-ray reports — I'll parse values and imaging conclusions. Paste text below if needed.")}
        <h2>Tests & report uploads</h2>${testsHtml}
        <div class="form-group" style="margin-top:1rem"><label>Paste report text (labs / MRI / CT)</label>
          <textarea id="pastedReport" placeholder="Paste IMPRESSION, CONCLUSION, Hb, CRP, etc.">${esc(state.pastedReportText)}</textarea></div>
        <div class="form-group"><label>Additional results</label>
          <div id="extraLabs">${Object.entries(state.manualLabs).filter(([k]) => !(state.recommendedTests||[]).includes(k))
            .map(([k,v]) => `<div class="lab-input-row"><input value="${esc(k)}" readonly><input value="${esc(v)}" class="extra-val" data-k="${esc(k)}"><button class="add-lab-btn" onclick="removeExtraLab('${esc(k)}')">✕</button></div>`).join('')}
          </div>
          <div class="lab-input-row"><input type="text" id="newLabName" placeholder="Test name"><input type="text" id="newLabVal" placeholder="Result"><button class="add-lab-btn" onclick="addExtraLab()">+ Add</button></div>
        </div>
        <div class="btn-row"><button class="btn-secondary" onclick="prevStep()">← Back</button><button class="btn-primary" onclick="saveInvestigations()">View final assessment →</button></div>
      </div>`;
    }

    function renderAssessment() {
      return `<div class="card"><div class="step-label">Step 8 · Final assessment</div>
        ${gpMessage(`${GP_NAME} is preparing your final management plan…`)}
        <p style="color:var(--muted)">Analysing reports…</p></div>`;
    }

    async function renderAssessmentAsync() {
      const a = await runAnalysis();
      const dx = a.diagnosis;
      const conf = Math.min(dx.confidence + (Object.keys(state.manualLabs).length ? 8 : 0), 95);
      const medsHtml = a.meds.map(m => `<div class="med-card"><h4>💊 ${esc(m.name)}</h4>
        <div class="med-detail">
          <span><strong>Dose:</strong> ${esc(m.dose)}</span><span><strong>Frequency:</strong> ${esc(m.frequency)}</span>
          <span><strong>Duration:</strong> ${esc(m.duration)}</span><span><strong>Food:</strong> ${esc(m.food)}</span>
        </div><p style="font-size:0.84rem;margin-top:0.5rem;color:var(--muted)">${esc(m.notes)}</p>
        ${m.caution ? `<p style="font-size:0.78rem;color:var(--warning);margin-top:0.3rem"><strong>Caution:</strong> ${esc(m.caution)}</p>` : ''}
      </div>`).join('');

      const drugNotes = a.drugNotes?.length
        ? `<div class="red-flag" style="background:rgba(251,191,36,0.08);border-color:rgba(251,191,36,0.3);color:var(--warning)">${a.drugNotes.map(n => esc(n.text)).join('<br>')}</div>` : '';

      /* NEW: drug-induced causation banner — surfaces BNF/MHRA-grounded drug → symptom links. */
      const etiology = a.etiologyFindings || [];
      const etiologyHtml = etiology.length
        ? `<div class="red-flag" style="background:rgba(220,38,38,0.10);border-color:rgba(220,38,38,0.45);color:#fca5a5">
            <strong>💊 Drug-induced cause possible</strong> — ${etiology.length} high-confidence link${etiology.length > 1 ? 's' : ''} found between your current medication and your presenting complaint:
            ${etiology.slice(0, 3).map(e => `<div style="margin-top:0.6rem"><strong>${esc(e.drug)}</strong> (${esc(e.drugClass)}) → <strong>${esc(e.effect)}</strong> &nbsp;<span style="color:var(--muted);font-size:0.82rem">[${Math.round(e.confidence * 100)}% confidence; trigger: "${esc(e.matchedKeyword)}"]</span><br>
            <span style="font-size:0.84rem">${esc(e.advice)}</span></div>`).join('')}
          </div>` : '';

      const parsedHtml = a.parsedReports?.length
        ? `<div class="result-panel"><h3>📄 Parsed report data</h3>
          ${a.parsedReports.map(r => `<p style="font-size:0.84rem;color:var(--muted)">${esc(r.summary)}</p>`).join('')}</div>` : '';

      const refHtml = renderReferrals(a.referrals);
      const urgent = dx.urgent;
      const aiResultHtml = state.aiResult ? renderAiResult(state.aiResult) : '';

      saveToPatientLog();
      document.getElementById('stepContainer').innerHTML = `<div class="card">
        <div class="step-label">Step 8 · Final assessment</div>
        ${gpMessage(`Here is my assessment and management plan${state.name ? ', ' + esc(state.name.split(' ')[0]) : ''}. I've correlated your history, ${state.imageAnalysis ? 'photo analysis, ' : ''}and any reports you've shared.`)}
        ${renderReasoning(a.reasoningChain)}
        ${etiologyHtml}
        ${aiResultHtml}
        ${urgent ? `<div class="red-flag"><strong>🚨 Urgent action required</strong> Contact 1122 (Rescue 1122) — Pakistan emergency ambulance service. Do not rely on this app alone.</div>` : ''}
        ${refHtml}
        <div class="result-panel"><h3>✅ Likely diagnosis</h3>
          <span class="diagnosis-badge">${esc(dx.primary)}</span>
          <div class="confidence"><div class="confidence-fill" style="width:${conf}%"></div></div>
          <p style="font-size:0.82rem;color:var(--muted)">Final confidence: ${conf}%</p>
        </div>
        <div class="result-panel"><h3>📋 Differentials</h3>
          ${(dx.differentials||[]).map(d => `<span class="diff-badge">${esc(d)}</span>`).join('')}</div>
        ${parsedHtml}
        <h2 style="margin-top:1rem">💊 Recommended management</h2>${drugNotes}${medsHtml}
        <div class="safety-net"><strong>🛡️ Safety netting</strong><br>${esc(a.safetyNet)}</div>
        <div class="result-panel" style="margin-top:1rem">
          <h3>📚 MRCGP knowledge base applied</h3>
          <ul class="guideline-list">
            <li><strong>Primary guideline:</strong> ${esc(a.guideline)}</li>
            <li><strong>Reference frameworks:</strong> NICE CKS, NICE NG guidelines, BNF, RCGP Curriculum, GMC Good Medical Practice, FSRH, BASHH, BTS/SIGN, GOLD, GINA, QOF, Mental Capacity Act 2005, DVLA medical guidance, UK National Screening Committee</li>
            <li><strong>Clinical reasoning model:</strong> Hypothetico-deductive (Murtagh), dual-process (System 1/System 2), person-centred care (Calgary\u2013Cambridge)</li>
            <li><strong>AKT/CSA competencies touched:</strong> Evidence-based practice, drug interactions (STOPP/START), safeguarding, professionalism, primary care management, complex multimorbidity</li>
          </ul>
        </div>
        <div class="result-panel">
          <h3>🚩 Red flags screened</h3>
          <ul class="red-flag-list">
            <li>Cardiovascular: ACS, dissection, PE, aortic aneurysm, severe HTN</li>
            <li>Neurological: SAH, stroke/TIA, meningitis, cord compression, cauda equina</li>
            <li>Sepsis / systemic: NEWS2 score, neutropenic sepsis, anaphylaxis</li>
            <li>Oncological: 2WW criteria, weight loss, haemoptysis, dysphagia, postmenopausal bleeding</li>
            <li>Suicide/self-harm risk: PHQ-9, active ideation, crisis plan — <strong>Umang Pakistan 0311-7786624</strong></li>
            <li>Safeguarding: children, adults at risk, domestic abuse, modern slavery</li>
          </ul>
        </div>
        <div class="guideline-ref">📚 ${esc(a.guideline)} · NICE CKS, BNF, RCGP Curriculum<br><br>
          <em>Educational tool only — not a substitute for a registered GP, physical examination, or emergency care.<br>
          In an emergency call <strong>1122</strong> (Rescue 1122). Mental health crisis: <strong>Pakistan mental health helpline (Umang Pakistan 0311-7786624)</strong>.</em></div>
        <div class="btn-row">
          <button class="btn-secondary" onclick="resetConsult()">Start new consultation</button>
          <button class="btn-primary" onclick="window.print()">Print summary</button>
        </div>
      </div>`;
    }

    function attachListeners() {
      document.querySelectorAll('.chip[data-comorbid]').forEach(chip => {
        chip.onclick = () => {
          const c = chip.dataset.comorbid;
          if (c === 'None') state.comorbidities = ['None'];
          else {
            state.comorbidities = state.comorbidities.filter(x => x !== 'None');
            state.comorbidities = state.comorbidities.includes(c)
              ? state.comorbidities.filter(x => x !== c) : [...state.comorbidities, c];
          }
          renderStep();
        };
      });
      document.querySelectorAll('[data-remove-custom]').forEach(btn => {
        btn.onclick = (e) => {
          e.stopPropagation();
          const c = btn.dataset.removeCustom;
          state.customComorbidities = state.customComorbidities.filter(x => x !== c);
          delete state.customComorbidMeds[c];
          renderStep();
        };
      });
      document.querySelectorAll('.test-upload').forEach(input => {
        input.onchange = async (e) => {
          const test = e.target.dataset.test;
          const file = e.target.files[0];
          if (file) {
            state.uploadedTests[test] = { name: file.name };
            if (!state.reportFiles.find(f => f.name === file.name)) state.reportFiles.push(file);
            renderStep();
          }
        };
      });
      document.querySelectorAll('.manual-lab').forEach(input => {
        input.onchange = () => { state.manualLabs[input.dataset.manualTest] = input.value; };
      });
      document.querySelectorAll('.upload-zone').forEach(z => {
        z.onclick = (e) => { if (e.target.tagName !== 'INPUT') z.querySelector('input')?.click(); };
      });
      const photoInput = document.getElementById('complaintPhoto');
      if (photoInput) {
        photoInput.onchange = async (e) => {
          const file = e.target.files[0];
          if (file) {
            state.complaintImage = file;
            if (state.complaintImageUrl) URL.revokeObjectURL(state.complaintImageUrl);
            state.complaintImageUrl = URL.createObjectURL(file);
            state.imageAnalysis = await engine.analyzeImage(file);
            renderStep();
          }
        };
      }
      const photoZone = document.getElementById('photoZone');
      if (photoZone) photoZone.onclick = (e) => { if (e.target.tagName !== 'INPUT') document.getElementById('complaintPhoto')?.click(); };
    }

    function nextStep() {
      state.step++;
      if (state.step === 6) { renderStep(); renderReviewAsync(); return; }
      if (state.step === 8) { renderStep(); renderAssessmentAsync(); return; }
      renderStep(); window.scrollTo(0, 0);
    }
    function prevStep() { state.step = Math.max(0, state.step - 1); renderStep(); window.scrollTo(0, 0); }

    function saveAbout() {
      state.name = document.getElementById('name').value.trim();
      state.age = parseAge(document.getElementById('age').value);
      state.gender = document.getElementById('gender').value;
      if (state.age === '' || !state.gender) { alert('Please enter age and gender.'); return; }
      document.getElementById('age').value = formatAge(state.age);
      nextStep();
    }
    function saveComplaint() {
      state.complaint = document.getElementById('complaint').value.trim();
      state.duration = document.getElementById('duration').value;
      state.durationUnit = document.getElementById('durationUnit').value;
      if (!state.complaint) { alert('Please describe your complaint.'); return; }
      nextStep();
    }
    function skipPhoto() { state.complaintImage = null; state.imageAnalysis = null; nextStep(); }
    function savePhoto() { nextStep(); }
    function saveHistory() {
      const pathway = GP_PATHWAYS[state.pathwayKey] || GP_PATHWAYS.default;
      const ctx = { gender: state.gender, age: parseInt(state.age) || 0 };
      pathway.questions.forEach(q => {
        if (q.showIf && !q.showIf(ctx)) return;
        if (q.type === 'radio') {
          const sel = document.querySelector(`input[name="${q.id}"]:checked`);
          state.historyAnswers[q.id] = sel ? sel.value : '';
        } else {
          const el = document.getElementById('hist_' + q.id);
          state.historyAnswers[q.id] = el ? el.value : '';
        }
      });
      nextStep();
    }
    function saveBackground() {
      state.medications = document.getElementById('medications').value.trim();
      state.recentMedication = document.getElementById('recentMedication').value.trim();
      state.recentMedicationDays = document.getElementById('recentMedicationDays').value.trim();
      state.allergies = document.getElementById('allergies').value.trim();
      state.smoking = document.getElementById('smoking').value;
      state.alcohol = document.getElementById('alcohol').value;
      const p = document.getElementById('pregStatus');
      if (p) state.pregStatus = p.value;
      const o = document.getElementById('occupation');
      if (o) state.occupation = o.value.trim();
      const fh = document.getElementById('familyHistory');
      if (fh) state.familyHistory = fh.value.trim();
      // Merge any custom meds into the medication list
      const extraMeds = Object.entries(state.customComorbidMeds || {})
        .map(([cond, med]) => `${med} (for ${cond})`).join('; ');
      if (extraMeds && !state.medications.includes(extraMeds)) {
        state.medications = state.medications ? state.medications + '; ' + extraMeds : extraMeds;
      }
      nextStep();
    }
    function saveInvestigations() {
      document.querySelectorAll('.manual-lab').forEach(i => { if (i.value.trim()) state.manualLabs[i.dataset.manualTest] = i.value.trim(); });
      const pasted = document.getElementById('pastedReport');
      if (pasted) state.pastedReportText = pasted.value.trim();
      nextStep();
    }
    function addExtraLab() {
      const n = document.getElementById('newLabName')?.value.trim();
      const v = document.getElementById('newLabVal')?.value.trim();
      if (n && v) { state.manualLabs[n] = v; renderStep(); }
    }

    /* ── Custom comorbidity management ── */
    function toggleCustomForm() {
      state._showAddCustom = !state._showAddCustom;
      renderStep();
    }
    function addCustomComorbid() {
      const nameEl = document.getElementById('newComorbidName');
      const medEl = document.getElementById('newComorbidMed');
      const name = nameEl?.value.trim();
      const med = medEl?.value.trim() || '';
      if (!name) { alert('Please enter a condition name.'); nameEl?.focus(); return; }
      if (!state.customComorbidities) state.customComorbidities = [];
      if (state.customComorbidities.includes(name) || state.comorbidities.includes(name)) {
        alert('This condition is already selected.');
        return;
      }
      state.customComorbidities.push(name);
      if (med) state.customComorbidMeds[name] = med;
      state._showAddCustom = false;
      renderStep();
    }
    function removeExtraLab(k) { delete state.manualLabs[k]; renderStep(); }
    function resetConsult() {
      Object.assign(state, {
        step: 0, name: '', age: '', gender: '', complaint: '', duration: '', durationUnit: 'days',
        comorbidities: [], customComorbidities: [], customComorbidMeds: {},
        medications: '', recentMedication: '', recentMedicationDays: '', allergies: '', smoking: '', alcohol: '',
        pregStatus: '', occupation: '', familyHistory: '',
        historyAnswers: {}, pathwayKey: null, complaintImage: null, imageAnalysis: null,
        recommendedTests: [], uploadedTests: {}, manualLabs: {}, reportFiles: [],
        pastedReportText: '', parsedReports: [], analysis: null, _showAddCustom: false, _savedToLog: false, _savedToLog: false
      });
      if (state.complaintImageUrl) URL.revokeObjectURL(state.complaintImageUrl);
      state.complaintImageUrl = null;
      updateLogBadge();
      renderStep();
    }

    /* ── Patient Log ── */
    function saveToPatientLog() {
      const a = state.analysis;
      if (!a || state._savedToLog) return;
      state._savedToLog = true;
      const c = Math.min(a.diagnosis?.confidence + (Object.keys(state.manualLabs).length ? 8 : 0), 95);
      const entry = {
        id: Date.now(),
        date: new Date().toLocaleString('en-GB', { day:'numeric', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' }),
        name: state.name || 'Anonymous', age: state.age, gender: state.gender,
        complaint: state.complaint, duration: state.duration + ' ' + state.durationUnit,
        pathway: state.pathwayKey, diagnosis: a.diagnosis?.primary || '', confidence: c,
        differentials: a.diagnosis?.differentials || [], urgent: a.diagnosis?.urgent || false,
        referrals: a.referrals || [], medications: (a.meds || []).map(m => m.name),
        safetyNet: a.safetyNet || '', guideline: a.guideline || ''
      };
      let log = JSON.parse(localStorage.getItem('personalGP_log') || '[]');
      log.unshift(entry);
      localStorage.setItem('personalGP_log', JSON.stringify(log));
      updateLogBadge();
    }

    function updateLogBadge() {
      const el = document.getElementById('logCount');
      if (el) { const log = JSON.parse(localStorage.getItem('personalGP_log') || '[]'); el.textContent = log.length; }
    }

    function showPatientLog() {
      const log = JSON.parse(localStorage.getItem('personalGP_log') || '[]');
      const listHtml = log.length
        ? `<div class="log-list">${log.map((e, i) => `<div class="log-entry" onclick="viewPatientLogEntry(${i})">
          <div class="log-entry-top">
            <div><div class="log-entry-date">${esc(e.date)}</div>
              <div class="log-entry-name">${esc(e.name)}${e.urgent ? ' <span class="log-entry-urgent">🚨 URGENT</span>' : ''}</div>
            </div>
            <div class="log-entry-diag">${esc(e.diagnosis)}</div>
          </div>
          <div class="log-entry-complaint">${esc(e.complaint)}</div>
        </div>`).join('')}</div>
        <div class="log-actions">
          <button class="btn-secondary" onclick="renderStep()">← Back to consultation</button>
          <button class="btn-secondary" style="color:var(--danger);border-color:rgba(248,113,113,0.3)" onclick="clearPatientLog()">🗑️ Clear all</button>
        </div>`
        : `<div class="log-empty">No patient records yet.</div>
          <div class="log-actions"><button class="btn-secondary" onclick="renderStep()">← Back</button></div>`;
      document.getElementById('stepContainer').innerHTML = `<div class="card">
        <div class="step-label">📋 Patient Log</div>
        ${log.length ? '<p style="font-size:0.82rem;color:var(--muted);margin-bottom:1rem">' + log.length + ' record(s) · Click to view details</p>' : ''}
        ${listHtml}
      </div>`;
    }

    function viewPatientLogEntry(idx) {
      const log = JSON.parse(localStorage.getItem('personalGP_log') || '[]');
      const e = log[idx]; if (!e) return;
      document.getElementById('stepContainer').innerHTML = `<div class="card">
        <div class="step-label">Patient Record</div>
        <div class="log-detail-grid">
          <div class="log-detail-row"><span class="log-detail-label">Date</span><span class="log-detail-value">${esc(e.date)}</span></div>
          <div class="log-detail-row"><span class="log-detail-label">Name</span><span class="log-detail-value">${esc(e.name)}</span></div>
          <div class="log-detail-row"><span class="log-detail-label">Age / Gender</span><span class="log-detail-value">${esc(e.age)} / ${esc(e.gender)}</span></div>
          <div class="log-detail-row"><span class="log-detail-label">Complaint</span><span class="log-detail-value">${esc(e.complaint)}</span></div>
          <div class="log-detail-row"><span class="log-detail-label">Duration</span><span class="log-detail-value">${esc(e.duration)}</span></div>
          <div class="log-detail-row"><span class="log-detail-label">Pathway</span><span class="log-detail-value">${esc(e.pathway)}</span></div>
          <div class="log-detail-row"><span class="log-detail-label">Diagnosis</span><span class="log-detail-value">${esc(e.diagnosis)} ${e.urgent ? '🚨' : ''}</span></div>
          <div class="log-detail-row"><span class="log-detail-label">Confidence</span><span class="log-detail-value">${e.confidence}%</span></div>
          <div class="log-detail-row"><span class="log-detail-label">Differentials</span><span class="log-detail-value">${e.differentials.length ? esc(e.differentials.join(', ')) : 'None'}</span></div>
          <div class="log-detail-row"><span class="log-detail-label">Referrals</span><span class="log-detail-value">${e.referrals.length ? e.referrals.map(r => esc(r.specialty) + ' (' + esc(r.urgency) + ')').join('; ') : 'None'}</span></div>
          <div class="log-detail-row"><span class="log-detail-label">Medications</span><span class="log-detail-value">${e.medications.length ? esc(e.medications.join('; ')) : 'None'}</span></div>
          <div class="log-detail-row"><span class="log-detail-label">Safety netting</span><span class="log-detail-value">${esc(e.safetyNet)}</span></div>
          <div class="log-detail-row"><span class="log-detail-label">Guideline</span><span class="log-detail-value">${esc(e.guideline)}</span></div>
        </div>
        <div class="log-actions">
          <button class="btn-secondary" onclick="showPatientLog()">← Back to log</button>
          <button class="btn-secondary" onclick="renderStep()">← Back to consultation</button>
        </div>
      </div>`;
    }

    function clearPatientLog() {
      if (!confirm('Delete all patient records? This cannot be undone.')) return;
      localStorage.removeItem('personalGP_log');
      updateLogBadge();
      showPatientLog();
    }

    updateLogBadge();
    renderStep();
  </script>
</body>
</html>
