<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Personal GP — Dr. Eve</title>
  <style>
    :root {
      --primary: #2dd4bf;
      --primary-dim: #14b8a6;
      --primary-dark: #0d9488;
      --accent: #134e4a;
      --accent-soft: rgba(45, 212, 191, 0.08);
      --surface: #1a2332;
      --surface-2: #243044;
      --bg: #0f1419;
      --text: #e8eef4;
      --muted: #8b9cb3;
      --border: #2d3a4f;
      --success: #34d399;
      --warning: #fbbf24;
      --danger: #f87171;
      --shadow: 0 8px 32px rgba(0, 0, 0, 0.45);
      --radius: 16px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      background-image: radial-gradient(ellipse at 20% 0%, rgba(45, 212, 191, 0.06) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 100%, rgba(20, 184, 166, 0.04) 0%, transparent 40%);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
    }
    .app-header {
      background: linear-gradient(135deg, #0c1220 0%, #152238 50%, #0f2a2a 100%);
      border-bottom: 1px solid var(--border);
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      box-shadow: var(--shadow);
    }
    .header-brand { display: flex; align-items: center; gap: 0.85rem; }
    .doctor-avatar-wrap {
      width: 52px; height: 52px;
      border-radius: 50%;
      border: 2px solid var(--primary);
      box-shadow: 0 0 20px rgba(45, 212, 191, 0.25);
      overflow: hidden;
      flex-shrink: 0;
      background: linear-gradient(145deg, #1e3a5f, #0f766e);
    }
    .doctor-avatar { width: 100%; height: 100%; display: block; }
    .app-header h1 { font-size: 1.2rem; font-weight: 600; color: var(--text); }
    .app-header .subtitle { font-size: 0.8rem; color: var(--muted); }
    .app-header .gp-name { color: var(--primary); font-weight: 600; }
    .container { max-width: 820px; margin: 0 auto; padding: 1.25rem 1rem 3rem; }
    .progress-bar { display: flex; gap: 4px; margin-bottom: 1.25rem; }
    .progress-segment { flex: 1; height: 3px; background: var(--border); border-radius: 2px; transition: background 0.3s; }
    .progress-segment.active, .progress-segment.done { background: var(--primary); }
    .step-label { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 0.5rem; }
    .card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 1.5rem;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      animation: fadeIn 0.35s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .gp-avatar {
      display: flex; gap: 1rem; align-items: flex-start;
      background: var(--accent-soft);
      border-radius: 12px;
      padding: 1rem 1.15rem;
      margin-bottom: 1.25rem;
      border: 1px solid rgba(45, 212, 191, 0.2);
      border-left: 3px solid var(--primary);
    }
    .gp-avatar .doctor-avatar-wrap { width: 48px; height: 48px; }
    .gp-avatar .name { font-weight: 600; color: var(--primary); margin-bottom: 0.2rem; font-size: 0.95rem; }
    .gp-avatar .message { font-size: 0.92rem; color: var(--text); opacity: 0.95; }
    h2 { font-size: 1.15rem; color: var(--text); margin-bottom: 0.85rem; }
    .form-group { margin-bottom: 1.1rem; }
    label { display: block; font-weight: 500; margin-bottom: 0.35rem; font-size: 0.88rem; color: var(--muted); }
    label .optional { font-weight: 400; font-size: 0.78rem; }
    input[type="text"], input[type="number"], select, textarea {
      width: 100%; padding: 0.7rem 0.95rem;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 0.95rem; font-family: inherit;
      background: var(--surface-2); color: var(--text);
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input:focus, select:focus, textarea:focus {
      outline: none; border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(45, 212, 191, 0.15);
    }
    textarea { min-height: 96px; resize: vertical; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.85rem; }
    @media (max-width: 560px) { .row { grid-template-columns: 1fr; } }
    /* Mobile / phone tweaks — small screens, touch-friendly */
    @media (max-width: 480px) {
      .app-header { padding: 0.85rem 1rem; gap: 0.65rem; }
      .app-header h1 { font-size: 1rem; }
      .app-header .subtitle { font-size: 0.72rem; }
      .container { padding: 0.85rem 0.75rem 2.5rem; }
      .card { padding: 1.1rem 0.95rem; }
      .lab-input-row, .comorbid-add-row { grid-template-columns: 1fr; }
      .lab-input-row button, .comorbid-add-row button { width: 100%; }
      button { padding: 0.85rem 1.2rem; min-height: 44px; } /* Apple HIG tap target */
      .upload-zone { padding: 1.5rem 0.85rem; min-height: 80px; }
      .step-label { font-size: 0.68rem; }
      .question-block { padding: 0.85rem; }
      .question-block h3 { font-size: 0.85rem; }
      .radio-group label, .checkbox-group label { font-size: 0.88rem; padding: 0.4rem 0; min-height: 36px; }
      textarea { min-height: 88px; font-size: 16px; } /* iOS: 16px prevents auto-zoom on focus */
      input[type="text"], input[type="number"], select { font-size: 16px; } /* iOS: 16px prevents auto-zoom on focus */
      .med-detail { grid-template-columns: 1fr 1fr; }
      .header-brand { gap: 0.6rem; }
      .chip { padding: 0.5rem 0.85rem; font-size: 0.78rem; }
      .doctor-avatar-wrap { width: 44px; height: 44px; }
      .gp-avatar .doctor-avatar-wrap { width: 40px; height: 40px; }
    }
    .chip-group { display: flex; flex-wrap: wrap; gap: 0.45rem; margin-top: 0.4rem; }
    .chip {
      padding: 0.4rem 0.85rem; border: 1px solid var(--border);
      border-radius: 999px; background: var(--surface-2);
      cursor: pointer; font-size: 0.82rem; color: var(--muted);
      transition: all 0.2s; user-select: none;
    }
    .chip:hover { border-color: var(--primary); color: var(--primary); }
    .chip.selected { background: var(--accent); color: var(--primary); border-color: var(--primary); }
    .question-block {
      background: var(--surface-2); border: 1px solid var(--border);
      border-radius: 10px; padding: 1rem; margin-bottom: 0.85rem;
    }
    .question-block h3 { font-size: 0.9rem; color: var(--text); margin-bottom: 0.6rem; }
    .radio-group, .checkbox-group { display: flex; flex-direction: column; gap: 0.4rem; }
    .radio-group label, .checkbox-group label {
      display: flex; align-items: center; gap: 0.5rem;
      font-weight: 400; cursor: pointer; color: var(--text); font-size: 0.9rem;
    }
    .btn-row { display: flex; gap: 0.65rem; margin-top: 1.25rem; flex-wrap: wrap; }
    .toggle-row { display:flex; align-items:center; gap:0.5rem; cursor:pointer; }
    .toggle-row input[type="checkbox"] { width:18px;height:18px;cursor:pointer; }
    .badge-online { background:rgba(52,211,153,0.12);border-color:rgba(52,211,153,0.4);color:#34d399; }
    .badge-offline { background:rgba(248,113,113,0.10);border-color:rgba(248,113,113,0.3);color:#f87171; }
    details summary { user-select:none; }
    details summary::-webkit-details-marker { color:var(--primary); }
    button {
      padding: 0.75rem 1.35rem; border: none; border-radius: 10px;
      font-size: 0.92rem; font-weight: 600; cursor: pointer; font-family: inherit;
      transition: transform 0.1s, box-shadow 0.2s;
    }
    button:active { transform: scale(0.98); }
    button:disabled { opacity:0.5; cursor:not-allowed; transform:none !important; }
    .btn-primary {
      background: linear-gradient(135deg, var(--primary-dark), var(--primary));
      color: #0f1419;
      box-shadow: 0 4px 16px rgba(45, 212, 191, 0.3);
    }
    .btn-primary:hover { box-shadow: 0 6px 20px rgba(45, 212, 191, 0.4); }
    .btn-secondary { background: var(--surface-2); color: var(--primary); border: 1px solid var(--border); }
    .btn-secondary:hover { border-color: var(--primary); }
    .disclaimer {
      background: rgba(251, 191, 36, 0.08); border: 1px solid rgba(251, 191, 36, 0.3);
      border-radius: 10px; padding: 0.95rem; font-size: 0.84rem; color: #fcd34d; margin-bottom: 1.25rem;
    }
    .disclaimer strong { display: block; margin-bottom: 0.3rem; color: var(--warning); }
    .hidden { display: none !important; }
    .test-card {
      border: 1px solid var(--border); border-radius: 10px; padding: 0.9rem;
      margin-bottom: 0.65rem; display: flex; justify-content: space-between;
      align-items: center; flex-wrap: wrap; gap: 0.65rem; background: var(--surface-2);
    }
    .test-card.recommended { border-color: rgba(45, 212, 191, 0.4); }
    .test-card.uploaded { border-color: var(--success); background: rgba(52, 211, 153, 0.06); }
    .test-info h4 { font-size: 0.88rem; }
    .test-info p { font-size: 0.78rem; color: var(--muted); }
    .upload-zone {
      border: 2px dashed var(--border); border-radius: 10px; padding: 1.25rem;
      text-align: center; cursor: pointer; transition: all 0.2s; color: var(--muted); font-size: 0.88rem;
    }
    .upload-zone:hover { border-color: var(--primary); background: var(--accent-soft); color: var(--primary); }
    .upload-zone.has-file { border-color: var(--success); background: rgba(52, 211, 153, 0.06); }
    .image-preview { max-width: 100%; max-height: 200px; border-radius: 10px; margin-top: 0.75rem; border: 1px solid var(--border); }
    .result-panel {
      background: var(--surface-2); border-radius: 10px; padding: 1.1rem;
      margin-bottom: 0.85rem; border: 1px solid var(--border);
    }
    .result-panel h3 { font-size: 0.95rem; margin-bottom: 0.45rem; display: flex; align-items: center; gap: 0.4rem; }
    .diagnosis-badge {
      display: inline-block; background: var(--accent); color: var(--primary);
      padding: 0.3rem 0.8rem; border-radius: 999px; font-size: 0.84rem; font-weight: 600;
      border: 1px solid rgba(45, 212, 191, 0.3);
    }
    .diff-badge {
      display: inline-block; background: var(--surface); color: var(--muted);
      border: 1px solid var(--border); padding: 0.25rem 0.65rem;
      border-radius: 999px; font-size: 0.78rem; margin: 0.15rem;
    }
    .med-card {
      background: var(--surface-2); border: 1px solid var(--border);
      border-radius: 10px; padding: 0.95rem 1.1rem; margin-bottom: 0.65rem;
    }
    .med-card h4 { color: var(--primary); margin-bottom: 0.45rem; font-size: 0.92rem; }
    .med-detail { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 0.4rem; font-size: 0.82rem; }
    .med-detail span { background: var(--accent-soft); padding: 0.3rem 0.55rem; border-radius: 6px; color: var(--muted); }
    .red-flag {
      background: rgba(248, 113, 113, 0.1); border: 1px solid rgba(248, 113, 113, 0.35);
      color: var(--danger); border-radius: 10px; padding: 0.95rem; margin: 0.85rem 0; font-size: 0.88rem;
    }
    .safety-net {
      background: rgba(45, 212, 191, 0.06); border: 1px solid rgba(45, 212, 191, 0.2);
      border-radius: 10px; padding: 0.95rem; margin-top: 0.85rem; font-size: 0.86rem;
    }
    .guideline-ref { font-size: 0.76rem; color: var(--muted); margin-top: 0.85rem; padding-top: 0.85rem; border-top: 1px solid var(--border); }
    .confidence { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; margin: 0.45rem 0; }
    .confidence-fill { height: 100%; background: linear-gradient(90deg, var(--primary-dark), var(--success)); border-radius: 3px; }
    .reasoning-panel {
      background: #0c1520; border: 1px solid var(--border); border-radius: 10px;
      padding: 1rem; margin: 0.85rem 0; font-size: 0.82rem;
    }
    .reasoning-step {
      display: flex; gap: 0.65rem; padding: 0.4rem 0;
      border-bottom: 1px solid rgba(45, 58, 79, 0.5);
    }
    .reasoning-step:last-child { border-bottom: none; }
    .reasoning-step .tag {
      flex-shrink: 0; font-size: 0.68rem; font-weight: 700; text-transform: uppercase;
      color: var(--primary); background: var(--accent-soft); padding: 0.15rem 0.45rem;
      border-radius: 4px; height: fit-content;
    }
    .referral-card {
      background: linear-gradient(135deg, rgba(248, 113, 113, 0.08), rgba(251, 191, 36, 0.06));
      border: 1px solid rgba(248, 113, 113, 0.35);
      border-radius: 12px; padding: 1rem 1.15rem; margin: 0.85rem 0;
    }
    .referral-card.routine { border-color: rgba(45, 212, 191, 0.35); background: var(--accent-soft); }
    .referral-card h4 { color: var(--text); font-size: 0.92rem; margin-bottom: 0.35rem; }
    .urgency-badge {
      display: inline-block; padding: 0.2rem 0.6rem; border-radius: 999px;
      font-size: 0.72rem; font-weight: 700; text-transform: uppercase; margin-right: 0.4rem;
    }
    .urgency-Emergency { background: #7f1d1d; color: #fecaca; }
    .urgency-Same-day { background: #78350f; color: #fde68a; }
    .urgency-2WW { background: #581c87; color: #e9d5ff; }
    .urgency-Urgent { background: #92400e; color: #fef3c7; }
    .urgency-Routine { background: #134e4a; color: #99f6e4; }
    .summary-list { list-style: none; }
    .summary-list li { padding: 0.35rem 0; border-bottom: 1px solid var(--border); font-size: 0.88rem; }
    .summary-list strong { color: var(--primary); }
    .typing { display: inline-flex; gap: 4px; }
    .typing span { width: 6px; height: 6px; background: var(--primary); border-radius: 50%; animation: bounce 1.2s infinite; }
    .typing span:nth-child(2) { animation-delay: 0.15s; }
    .typing span:nth-child(3) { animation-delay: 0.3s; }
    @keyframes bounce { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-5px); } }
    .lab-input-row { display: grid; grid-template-columns: 1fr 1fr auto; gap: 0.45rem; margin-bottom: 0.45rem; align-items: end; }
    .add-lab-btn { padding: 0.45rem 0.65rem; font-size: 0.82rem; background: var(--surface-2); color: var(--primary); border: 1px solid var(--border); border-radius: 8px; cursor: pointer; }
    .image-analysis-box {
      background: var(--accent-soft); border: 1px solid rgba(45, 212, 191, 0.25);
      border-radius: 10px; padding: 0.85rem; margin-top: 0.65rem; font-size: 0.84rem;
    }
    /* ── Categorized comorbidities ── */
    .comorbid-category { margin-bottom: 0.85rem; }
    .comorbid-category-title {
      font-size: 0.72rem; font-weight: 700; color: var(--primary);
      text-transform: uppercase; letter-spacing: 0.08em;
      margin: 0.4rem 0 0.4rem 0.15rem;
      display: flex; align-items: center; gap: 0.4rem;
    }
    .comorbid-category-title::before {
      content: ''; flex: 0 0 4px; height: 4px; border-radius: 50%;
      background: var(--primary); display: inline-block;
    }
    .comorbid-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 0.35rem; }
    .comorbid-grid .chip { width: 100%; text-align: left; padding: 0.35rem 0.7rem; font-size: 0.78rem; }
    .add-custom-btn {
      display: inline-flex; align-items: center; gap: 0.4rem;
      padding: 0.4rem 0.85rem; border-radius: 999px;
      background: var(--accent-soft); color: var(--primary);
      border: 1px dashed rgba(45, 212, 191, 0.5);
      cursor: pointer; font-size: 0.82rem; font-weight: 600;
      transition: all 0.2s;
    }
    .add-custom-btn:hover { background: var(--accent); border-style: solid; }
    .add-custom-form {
      background: var(--surface-2); border: 1px solid var(--primary);
      border-radius: 10px; padding: 0.85rem; margin-top: 0.65rem;
      display: grid; grid-template-columns: 1fr 1fr auto; gap: 0.5rem; align-items: end;
      box-shadow: 0 4px 16px rgba(45, 212, 191, 0.15);
    }
    .add-custom-form input { width: 100%; }
    .custom-chip {
      background: rgba(45, 212, 191, 0.12);
      border: 1px solid var(--primary);
      color: var(--primary);
      position: relative; padding-right: 1.7rem;
    }
    .custom-chip .chip-remove {
      position: absolute; right: 0.45rem; top: 50%;
      transform: translateY(-50%); width: 18px; height: 18px;
      border-radius: 50%; background: var(--primary); color: #0f1419;
      border: none; cursor: pointer; font-size: 0.7rem; font-weight: 700;
      display: flex; align-items: center; justify-content: center; padding: 0;
    }
    .custom-chip .chip-remove:hover { background: var(--danger); color: white; }
    .selected-count {
      display: inline-block; background: var(--accent); color: var(--primary);
      padding: 0.15rem 0.5rem; border-radius: 999px; font-size: 0.72rem;
      font-weight: 600; margin-left: 0.4rem;
    }
    .guideline-list {
      list-style: none; padding: 0; margin: 0.5rem 0 0 0;
    }
    .guideline-list li {
      padding: 0.35rem 0; border-bottom: 1px solid var(--border);
      font-size: 0.82rem; color: var(--muted);
    }
    .guideline-list li strong { color: var(--primary); }
    .red-flag-list { list-style: none; padding: 0; margin: 0.5rem 0 0 0; }
    .red-flag-list li {
      padding: 0.3rem 0; font-size: 0.82rem; color: var(--muted);
      padding-left: 1.2rem; position: relative;
    }
    .red-flag-list li::before {
      content: '⚠'; position: absolute; left: 0; color: var(--warning);
    }
    .pathway-stats {
      display: flex; flex-wrap: wrap; gap: 0.4rem; margin-top: 0.5rem;
    }
    .pathway-stat {
      background: var(--accent-soft); color: var(--primary);
      padding: 0.2rem 0.6rem; border-radius: 6px; font-size: 0.74rem;
      border: 1px solid rgba(45, 212, 191, 0.2);
    }
    @media print {
      body { background: white; color: black; }
      .app-header, .progress-bar, .btn-row { display: none; }
      .card { box-shadow: none; border: 1px solid #ccc; }
    }
    /* ── Patient Log ── */
    .header-row { display: flex; align-items: center; justify-content: space-between; width: 100%; }
    .log-btn {
      background: var(--surface-2); border: 1px solid var(--border); border-radius: 10px;
      padding: 0.5rem 0.85rem; color: var(--muted); cursor: pointer; font-size: 0.78rem;
      display: flex; align-items: center; gap: 0.4rem; white-space: nowrap; font-family: inherit;
      transition: all 0.2s;
    }
    .log-btn:hover { border-color: var(--primary); color: var(--primary); }
    .log-badge {
      background: var(--primary); color: #0f1419; border-radius: 999px;
      padding: 0.05rem 0.4rem; font-size: 0.68rem; font-weight: 700; min-width: 18px; text-align: center;
    }
    .log-list { display: flex; flex-direction: column; gap: 0.65rem; }
    .log-entry {
      background: var(--surface-2); border: 1px solid var(--border); border-radius: 10px;
      padding: 0.9rem; cursor: pointer; transition: all 0.2s;
    }
    .log-entry:hover { border-color: var(--primary); }
    .log-entry-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 0.5rem; }
    .log-entry-date { font-size: 0.72rem; color: var(--muted); }
    .log-entry-name { font-size: 0.8rem; font-weight: 600; }
    .log-entry-complaint { font-size: 0.78rem; color: var(--muted); margin-top: 0.2rem; }
    .log-entry-diag { font-size: 0.78rem; color: var(--primary); margin-top: 0.2rem; }
    .log-entry-urgent { color: var(--danger); font-weight: 600; font-size: 0.72rem; }
    .log-detail-grid { display: grid; gap: 0.6rem; margin-top: 1rem; }
    .log-detail-row { display: flex; gap: 0.5rem; font-size: 0.84rem; }
    .log-detail-label { color: var(--muted); min-width: 100px; }
    .log-detail-value { color: var(--text); }
    .log-empty { text-align: center; padding: 2rem; color: var(--muted); font-size: 0.88rem; }
    .log-actions { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 1rem; }
  </style>
</head>
<body>
  <header class="app-header">
    <div class="header-brand">
      <div class="doctor-avatar-wrap" id="headerAvatar"></div>
      <div class="header-row">
        <div>
          <h1>Personal GP · <span class="gp-name">Dr. Eve</span></h1>
          <p class="subtitle">Intelligent clinical assistant · NICE CKS–aligned · AI-enhanced · Zero dependencies</p>
        </div>
        <button class="log-btn" onclick="showPatientLog()" title="View patient log">📋 Log <span class="log-badge" id="logCount">0</span></button>
      </div>
    </div>
  </header>

  <div class="container">
    <div class="progress-bar" id="progressBar"></div>
    <div id="stepContainer"></div>
  </div>
  <script>
/* Personal GP — MRCGP Curriculum-aligned Clinical Pathways (Offline) */
window.GP_PATHWAYS = {
  // ─── DERMATOLOGY ───
  dermatitis_eczema: {
    category: 'Dermatology', keywords: ['eczema', 'dermatitis', 'itchy rash', 'dry skin', 'atopic', 'contact rash', 'flaky skin'],
    imageRelevant: true,
    questions: [
      { id: 'itch', text: 'Is the rash itchy?', type: 'radio', options: ['Very itchy', 'Mildly itchy', 'Not itchy'] },
      { id: 'location', text: 'Where is the rash mainly?', type: 'radio', options: ['Flexures (elbows/knees)', 'Hands', 'Face', 'Widespread', 'Single area'] },
      { id: 'trigger', text: 'Any new soap, detergent, jewellery, or plant contact?', type: 'radio', options: ['Yes', 'No', 'Not sure'] },
      { id: 'weeping', text: 'Is the skin weeping, crusted, or infected-looking?', type: 'radio', options: ['Yes', 'No'] },
      { id: 'fever', text: 'Fever or feeling unwell?', type: 'radio', options: ['Yes', 'No'] }

    async parseFile(file) {
      const ext = (file.name.split('.').pop() || '').toLowerCase();
      let text = '';
      if (ext === 'txt' || file.type.startsWith('text/')) {
        text = await file.text();
      } else if (ext === 'pdf') {
        text = await this.extractPdfText(file);
      } else if (/^(jpg|jpeg|png|webp|bmp)$/.test(ext) || file.type.startsWith('image/')) {

      }

    async extractPdfText(file) {
      const buf = await file.arrayBuffer();
      const bytes = new Uint8Array(buf);
      let raw = '';
      for (let i = 0; i < bytes.length; i++) raw += String.fromCharCode(bytes[i]);
      const chunks = [];
      const tj = /\(([^)\\]*(?:\\.[^)\\]*)*)\)/g;
      let m;
      while ((m = tj.exec(raw)) !== null) {
        const s = m[1].replace(/\\n/g, '\n').replace(/\\r/g, '').replace(/\\\(/g, '(').replace(/\\\)/g, ')');
        if (s.length > 1 && /[a-zA-Z0-9]/.test(s)) chunks.push(s);
      }
      const streamText = raw.match(/BT[\s\S]*?ET/g) || [];
      streamText.forEach(block => {
        const inner = block.match(/\(([^)]+)\)/g);

    parseRadiology(text) {

      const extract = (keys) => {
        for (const k of keys) {

          const m = text.match(re);

      sections.impression = extract(['IMPRESSION', 'Impression', 'CONCLUSION', 'Conclusion', 'Summary']);
      sections.clinical = extract(['CLINICAL DETAILS', 'Clinical history', 'Indication']);

  /* ─── Image Analyzer ─── */
  class ImageAnalyzer {
    async analyze(file) {
      const img = await this.loadImage(file);
      const canvas = document.createElement('canvas');
      const size = 200;
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, size, size);
      const data = ctx.getImageData(0, 0, size, size).data;

      let rSum = 0, gSum = 0, bSum = 0, count = 0;
      let redPx = 0, darkPx = 0, brightPx = 0, yellowPx = 0, whitePx = 0;
      const grid = Array.from({ length: 4 }, () => Array(4).fill(0));

      for (let y = 0; y < size; y++) {
        for (let x = 0; x < size; x++) {
          const i = (y * size + x) * 4;
          const r = data[i], g = data[i + 1], b = data[i + 2];
          const max = Math.max(r, g, b), min = Math.min(r, g, b);
          const sat = max ? (max - min) / max : 0;
          rSum += r; gSum += g; bSum += b; count++;

          if (r > 120 && r > g * 1.15 && r > b * 1.1) redPx++;
          if (r > 180 && g > 140 && b < 100) yellowPx++;
          if (r > 200 && g > 200 && b > 200) whitePx++;
          if (max < 60) darkPx++;
          if (max > 220 && sat < 0.15) brightPx++;

          const gx = Math.min(3, Math.floor(x / (size / 4)));
          const gy = Math.min(3, Math.floor(y / (size / 4)));
          if (r > 100 && r > g && r > b) grid[gy][gx]++;
        }
      }

      const redness = Math.round((redPx / count) * 100);
      const uniformity = this.gridUniformity(grid);
      const ringPattern = this.detectRingPattern(data, size);
      const vesicular = whitePx > count * 0.08 && redness > 25;
      const pustular = yellowPx > count * 0.06;
      const purpuric = darkPx > count * 0.12 && redness > 30;
      const edgeIrregularity = this.edgeScore(data, size);

      const features = {
        redness, uniformity, ringPattern, vesicular, pustular, purpuric,
        edgeIrregularity, avgR: Math.round(rSum / count), avgG: Math.round(gSum / count), avgB: Math.round(bSum / count)
      };

      const morphology = [];
      if (redness > 55) morphology.push('marked erythema');
      else if (redness > 30) morphology.push('moderate erythema');
      if (ringPattern) morphology.push('annular/ring pattern (consider tinea, erythema migrans)');
      if (vesicular) morphology.push('vesicular appearance (consider varicella, herpes, dyshidrosis)');
      if (pustular) morphology.push('pustular/yellow component (consider bacterial infection, acne)');
      if (purpuric) morphology.push('purpuric/darker areas (consider purpura, vasculitis — non-blanching concern)');
      if (uniformity > 0.65) morphology.push('relatively uniform distribution (eczema, contact dermatitis)');
      if (edgeIrregularity > 0.45) morphology.push('irregular borders (consider melanoma if pigmented lesion — urgent dermoscopy)');

      const differentials = this.correlateDifferentials(features);
      const reasoning = [
        `Image sampled ${size}×${size}px — redness index ${redness}%`,
        `Pattern uniformity ${Math.round(uniformity * 100)}% — ${uniformity > 0.6 ? 'suggestive of diffuse inflammatory rash' : 'patchy distribution'}`,
        ringPattern ? 'Annular configuration detected — correlates with dermatophyte or erythema migrans' : null,
        morphology.length ? `Morphology: ${morphology.join('; ')}` : 'Limited distinctive morphology — correlate with history'
      ].filter(Boolean);

      return {
        features,
        morphology,
        differentials,
        reasoning,
        summary: morphology.length ? morphology.join('. ') : `Skin image shows ${redness}% erythema — clinical correlation required`
      };
    }

    loadImage(file) {
      return new Promise((resolve, reject) => {
        const url = URL.createObjectURL(file);
        const img = new Image();
        img.onload = () => { URL.revokeObjectURL(url); resolve(img); };
        img.onerror = reject;
        img.src = url;
      });
    }

    gridUniformity(grid) {
      const vals = grid.flat();
      const mean = vals.reduce((a, b) => a + b, 0) / vals.length;
      const variance = vals.reduce((s, v) => s + (v - mean) ** 2, 0) / vals.length;
      return Math.max(0, 1 - Math.sqrt(variance) / (mean + 1));
    }

    detectRingPattern(data, size) {
      const cx = size / 2, cy = size / 2;
      const radii = [size * 0.15, size * 0.25, size * 0.35];
      let ringScore = 0, samples = 0;
      for (let a = 0; a < Math.PI * 2; a += Math.PI / 16) {
        for (const rad of radii) {
          const x = Math.round(cx + Math.cos(a) * rad);
          const y = Math.round(cy + Math.sin(a) * rad);
          if (x < 0 || x >= size || y < 0 || y >= size) continue;
          const i = (y * size + x) * 4;
          const r = data[i], g = data[i + 1], b = data[i + 2];
          if (r > 110 && r > g * 1.1) ringScore++;
          samples++;
        }
      }
      const centerI = (Math.floor(cy) * size + Math.floor(cx)) * 4;
      const centerPale = data[centerI] > data[centerI + 1] && data[centerI + 1] > 80;
      return samples > 0 && ringScore / samples > 0.45 && centerPale;
    }

    edgeScore(data, size) {
      let edge = 0, total = 0;
      for (let y = 1; y < size - 1; y++) {
        for (let x = 1; x < size - 1; x++) {
          const i = (y * size + x) * 4;
          const iR = (y * size + x + 1) * 4;
          const iD = ((y + 1) * size + x) * 4;
          const grad = Math.abs(data[i] - data[iR]) + Math.abs(data[i] - data[iD]);
          if (grad > 80) edge++;
          total++;
        }
      }
      return edge / total;
    }

    correlateDifferentials(f) {
      const d = [];
      if (f.ringPattern) d.push('Tinea corporis', 'Erythema migrans (Lyme)', 'Granuloma annulare');
      if (f.redness > 50 && f.uniformity > 0.6) d.push('Eczema/dermatitis', 'Cellulitis', 'Drug eruption');
      if (f.vesicular) d.push('Herpes simplex/zoster', 'Varicella', 'Dyshidrosis');
      if (f.pustular) d.push('Bacterial folliculitis', 'Acne', 'Impetigo');
      if (f.purpuric) d.push('Purpura/vasculitis', 'Meningococcal rash (if unwell — emergency)');
      if (f.edgeIrregularity > 0.5 && f.avgR < 120) d.push('Melanoma (exclude urgently if pigmented)');
      if (!d.length) d.push('Non-specific rash — history and examination essential');
      return [...new Set(d)];
    }
  }

  /* ─── Drug Interaction Checker ─── */
  class DrugInteractionChecker {
    /* Substring-based matching on comorbidities for flexibility */
    _has(conds, ...needles) {
      const all = (conds || []).map(c => c.toLowerCase()).join(' \u2502 ');
      return needles.some(n => all.includes(n.toLowerCase()));
    }
    _medsText(meds) { return meds.map(m => m.name).join(' ').toLowerCase(); }

    check(state, meds) {
      const notes = [];
      const allergy = (state.allergies || '').toLowerCase();
      const medsText = (state.medications || '').toLowerCase();
      const prescribedNames = this._medsText(meds);
      const comorbid = state.comorbidities || [];
      const custom = state.customComorbidities || [];
      const allConds = [...comorbid, ...custom];
      const age = parseInt(state.age) || 0;
      const isPregnant = this._has(allConds, 'pregnant', 'pregnancy', 'breastfeeding', 'postnatal') || state.pregStatus;

      /* ── Allergies ── */
      if (allergy.includes('penicillin') && /penicillin|flucloxacillin|amoxicillin|co-amoxiclav|amoxiclav/i.test(prescribedNames))
        notes.push({ level: 'critical', text: '\ud83d\udd34 Penicillin allergy documented \u2014 avoid all \u03b2-lactams. Use clarithromycin, doxycycline, or per BNF allergy alternatives.' });
      if (allergy.includes('nsaid') && /ibuprofen|naproxen|diclofenac|aspirin/i.test(prescribedNames))
        notes.push({ level: 'critical', text: '\ud83d\udd34 NSAID allergy \u2014 avoid all NSAIDs including low-dose aspirin. Use paracetamol ± codeine.' });
      if (allergy.includes('aspirin') && /aspirin/i.test(prescribedNames))
        notes.push({ level: 'critical', text: '\ud83d\udd34 Aspirin allergy \u2014 do not administer; consider clopidogrel if antiplatelet indicated.' });
      if (allergy.includes('latex') && /\b(suppository|enema|condom)\b/i.test(prescribedNames))
        notes.push({ level: 'warning', text: 'Latex allergy \u2014 ensure latex-free formulation/supplies.' });
      if (allergy.includes('sulphur') || allergy.includes('sulfa') && /sulphamethoxazole|co-trimoxazole|trimethoprim/i.test(prescribedNames))
        notes.push({ level: 'warning', text: 'Sulfa allergy \u2014 check prescribed antibiotic for sulpha moiety.' });

      /* ── Pregnancy / breastfeeding ── */
      if (isPregnant) {
        if (/metronidazole/i.test(prescribedNames) && !/pregnan/i.test(notes.map(n => n.text).join(' ')))
          notes.push({ level: 'warning', text: 'Metronidazole in pregnancy \u2014 avoid 1st trimester; 2nd/3rd OK short course.' });
        if (/doxycycline|tetracycline|minocycline/i.test(prescribedNames))
          notes.push({ level: 'critical', text: '\ud83d\udd34 Tetracyclines CONTRAINDICATED in pregnancy (tooth discolouration, bone growth). Use amoxicillin or erythromycin.' });
        if (/ibuprofen|naproxen|diclofenac/i.test(prescribedNames) && this._has(allConds, 'pregnan', 'breast'))
          notes.push({ level: 'warning', text: 'NSAIDs in pregnancy/breastfeeding \u2014 avoid after 28 weeks (premature ductus closure); paracetamol first-line.' });
        if (/sildenafil|tadalafil/i.test(prescribedNames))
          notes.push({ level: 'critical', text: '\ud83d\udd34 PDE5 inhibitors contraindicated in pregnancy (for pulmonary HTN only \u2014 specialist).' });
        if (/misoprostol/i.test(prescribedNames))
          notes.push({ level: 'critical', text: '\ud83d\udd34 Misoprostol \u2014 OXYTOCIC, contraindicated in pregnancy unless for induction.' });
        if (/warfarin/i.test(prescribedNames))
          notes.push({ level: 'critical', text: '\ud83d\udd34 Warfarin contraindicated 1st trimester (teratogenic) and near term. Switch to LMWH.' });
        if (/statin|atorvastatin|simvastatin|rosuvastatin/i.test(prescribedNames))
          notes.push({ level: 'warning', text: 'Statins contraindicated in pregnancy \u2014 stop before conception.' });
        if (/acei|ramipril|lisinopril|enalapril|perindopril/i.test(prescribedNames) || /arb|losartan|valsartan|candesartan/i.test(prescribedNames))
          notes.push({ level: 'critical', text: '\ud83d\udd34 ACE inhibitors / ARBs CONTRAINDICATED in pregnancy \u2014 teratogenic. Switch to labetalol/methyldopa/nifedipine.' });
        if (/valproat|sodium valproate/i.test(prescribedNames))
          notes.push({ level: 'critical', text: '\ud83d\udd34 Valproate \u2014 PREGNANCY PREVENTION PROGRAMME mandatory (MHRA). Highly teratogenic.' });
        if (/isotretinoin|roaccutane|acitretin|alitretinoin/i.test(prescribedNames))
          notes.push({ level: 'critical', text: '\ud83d\udd34 Retinoids \u2014 ABSOLUTELY contraindicated in pregnancy (severe teratogen). Pregnancy Prevention Programme essential.' });
        if (/trimethoprim/i.test(prescribedNames) && this._has(allConds, 'pregnan') && !/first tr/i.test(notes.map(n=>n.text).join(' ')))
          notes.push({ level: 'warning', text: 'Trimethoprim in pregnancy \u2014 folate antagonist; avoid 1st trimester. Use nitrofurantoin (avoid near term).' });
        if (this._has(allConds, 'breast') && /codeine|morphine|tramadol/i.test(prescribedNames))
          notes.push({ level: 'warning', text: 'Codeine/opioids in breastfeeding \u2014 use paracetamol/ibuprofen first-line. Avoid codeine (CYP2D6 ultra-metabolisers).' });
      }

      /* ── Renal ── */
      if (this._has(allConds, 'kidney', 'ckd', 'renal', 'dialysis', 'transplant', 'nephro')) {
        if (/ibuprofen|naproxen|diclofenac|nsaid/i.test(prescribedNames))
          notes.push({ level: 'critical', text: '\ud83d\udd34 NSAIDs contraindicated in CKD \u2014 risk of AKI and progression. Use paracetamol.' });
        if (/metformin/i.test(prescribedNames))
          notes.push({ level: 'warning', text: 'Metformin in CKD \u2014 contraindicated if eGFR <30; reduce dose 500mg BD if eGFR 30\u201345 (MHRA 2022).' });
        if (/nitrofurantoin/i.test(prescribedNames) && age >= 65)
          notes.push({ level: 'warning', text: 'Nitrofurantoin \u2014 avoid if eGFR <45; reduced efficacy in renal impairment.' });
        if (/lithium/i.test(prescribedNames))
          notes.push({ level: 'critical', text: '\ud83d\udd34 Lithium in CKD \u2014 narrow therapeutic window; monitor levels and eGFR closely.' });
        if (/digoxin/i.test(prescribedNames))
          notes.push({ level: 'warning', text: 'Digoxin in CKD \u2014 dose reduce; monitor levels.' });
        if (/ramipril|lisinopril|perindopril|enalapril/i.test(prescribedNames))
          notes.push({ level: 'info', text: 'ACE inhibitor in CKD \u2014 renoprotective; monitor U&Es 1\u20132 weeks after initiation.' });
        if (/spironolactone|eplerenone/i.test(prescribedNames))
          notes.push({ level: 'warning', text: 'MRA in CKD \u2014 risk of hyperkalaemia; monitor K+ closely.' });
      }

      /* ── Hepatic ── */
      if (this._has(allConds, 'liver', 'hepatic', 'cirrhosis', 'hepatitis')) {
        if (/paracetamol/i.test(prescribedNames))
          notes.push({ level: 'warning', text: 'Paracetamol in liver disease \u2014 max 2\u20133 g/24h (not 4 g).' });
        if (/simvastatin|atorvastatin/i.test(prescribedNames))
          notes.push({ level: 'warning', text: 'Statins in liver disease \u2014 avoid in decompensated cirrhosis; use pravastatin/rosuvastatin with caution.' });
        if (/metronidazole/i.test(prescribedNames))
          notes.push({ level: 'warning', text: 'Metronidazole in liver disease \u2014 reduce dose; caution in hepatic encephalopathy.' });
        if (/warfarin/i.test(prescribedNames))
          notes.push({ level: 'warning', text: 'Warfarin in liver disease \u2014 increased sensitivity; monitor INR closely.' });
        if (/morphine|codeine|tramadol/i.test(prescribedNames))
          notes.push({ level: 'warning', text: 'Opioids in liver disease \u2014 reduced clearance; use lower doses, longer intervals.' });
      }

      /* ── Cardiovascular ── */
      if (this._has(allConds, 'atrial fibrillation', 'anticoagul', 'thromboemb', 'dvt', 'pe ')) {
        if (/flucloxacillin|amoxicillin|co-amoxiclav|erythromycin|metronidazole|trimethoprim/i.test(prescribedNames))
          notes.push({ level: 'warning', text: 'Antibiotic + warfarin/DOAC \u2014 INR may rise; check INR within 3\u20135 days (warfarin).' });
      }
      if (this._has(allConds, 'heart failure', 'chf', 'ccf')) {
        if (/ibuprofen|naproxen|diclofenac|nsaid/i.test(prescribedNames))
          notes.push({ level: 'critical', text: '\ud83d\udd34 NSAIDs contraindicated in heart failure \u2014 fluid retention, worsen HF. Use paracetamol.' });
        if (/verapamil|diltiazem/i.test(prescribedNames) && /beta|bisoprolol|atenolol|propranolol/i.test(prescribedNames))
          notes.push({ level: 'warning', text: 'Non-DHP CCB + beta-blocker \u2014 risk of bradycardia; use with caution in HF.' });
        if (/pioglitazone|rosiglitazone/i.test(prescribedNames))
          notes.push({ level: 'critical', text: '\ud83d\udd34 Glitazones CONTRAINDICATED in heart failure (fluid retention).' });
      }
      if (this._has(allConds, 'ischaemic', 'ihd', 'angina', 'mi', 'coronary')) {
        if (/sumatriptan|rizatriptan|naratriptan/i.test(prescribedNames))
          notes.push({ level: 'critical', text: '\ud83d\udd34 Triptans contraindicated in IHD/coronary spasm.' });
      }

      /* ── Asthma / COPD ── */
      if (this._has(allConds, 'asthma')) {
        if (/ibuprofen|naproxen|aspirin|nsaid/i.test(prescribedNames))
          notes.push({ level: 'warning', text: 'NSAIDs in asthma \u2014 caution in aspirin-sensitive asthma (~10%); paracetamol safer.' });
        if (/bisoprolol|atenolol|propranolol|beta-?blocker/i.test(prescribedNames) && !/cardioselective/i.test(prescribedNames))
          notes.push({ level: 'warning', text: 'Non-selective beta-blockers contraindicated in asthma. Cardioselective (bisoprolol) may be used cautiously.' });
        if (/verapamil/i.test(prescribedNames))
          notes.push({ level: 'info', text: 'Verapamil OK in asthma; avoid non-selective beta-blockers.' });
      }

      /* ── Diabetes ── */
      if (this._has(allConds, 'diabetes', 'type 1', 'type 2', 't2dm', 't1dm')) {
        if (/prednisolone|steroid/i.test(prescribedNames))
          notes.push({ level: 'warning', text: 'Steroid in diabetes \u2014 may worsen glycaemic control; monitor blood glucose.' });
        if (/fluoroquinolone|ciprofloxacin|levofloxacin/i.test(prescribedNames))
          notes.push({ level: 'warning', text: 'Fluoroquinolones \u2014 caution in diabetes (dysglycaemia risk); MHRA 2018.' });
      }

      /* ── Epilepsy ── */
      if (this._has(allConds, 'epilepsy', 'seizure')) {
        if (/ciprofloxacin|levofloxacin|fluoroquinolone/i.test(prescribedNames))
          notes.push({ level: 'warning', text: 'Fluoroquinolones lower seizure threshold \u2014 use with caution in epilepsy.' });
        if (/tramadol|codeine/i.test(prescribedNames))
          notes.push({ level: 'warning', text: 'Tramadol lowers seizure threshold \u2014 avoid in epilepsy.' });
        if (/bupropion/i.test(prescribedNames))
          notes.push({ level: 'critical', text: '\ud83d\udd34 Bupropion CONTRAINDICATED in epilepsy (seizure risk).' });
      }

      /* ── G6PD / haematology ── */
      if (this._has(allConds, 'g6pd') || allergy.includes('g6pd')) {
        if (/nitrofurantoin|sulphonamide|aspirin|quinine|primaquine|dapsone/i.test(prescribedNames))
          notes.push({ level: 'critical', text: '\ud83d\udd34 G6PD deficiency \u2014 avoid oxidant drugs (sulpha, nitrofurantoin, primaquine, dapsone, aspirin).' });
      }

      /* ── HIV / immunosuppression ── */
      if (this._has(allConds, 'hiv', 'immunosuppression', 'transplant', 'chemotherapy')) {
        if (/rifampicin|rifabutin/i.test(prescribedNames))
          notes.push({ level: 'critical', text: '\ud83d\udd34 Rifampicin \u2014 many drug interactions via CYP450. Check ART / transplant meds.' });
        if (/live vaccine|yellow fever|sabin/i.test(prescribedNames.toLowerCase()))
          notes.push({ level: 'critical', text: '\ud83d\udd34 Live vaccines CONTRAINDICATED in immunosuppression.' });
      }

      /* ── Bleeding / anticoagulation ── */
      if (this._has(allConds, 'anticoagul', 'warfarin', 'doac', 'apixaban', 'rivaroxaban')) {
        if (/ibuprofen|naproxen|diclofenac|nsaid/i.test(prescribedNames))
          notes.push({ level: 'critical', text: '\ud83d\udd34 NSAIDs + anticoagulant \u2014 markedly increased bleeding risk. Paracetamol first-line.' });
        if (/aspirin|clopidogrel|prasugrel|ticagrelor/i.test(prescribedNames))
          notes.push({ level: 'warning', text: 'Dual/triple antiplatelet + anticoagulant \u2014 only with cardiology guidance.' });
      }

      /* ── Elderly (STOPP/START) ── */
      if (age >= 65) {
        if (/ibuprofen|naproxen|diclofenac|nsaid/i.test(prescribedNames))
          notes.push({ level: 'warning', text: 'STOPP criteria \u2014 long-term NSAIDs inappropriate in \u226565 (GI bleed, renal, cardiovascular risk).' });
        if (/diazepam|temazepam|loprazolam|zopiclone|zolpidem/i.test(prescribedNames))
          notes.push({ level: 'warning', text: 'STOPP \u2014 benzodiazepines/Z-drugs increase falls/fracture risk in \u226565. Avoid if possible.' });
        if (/amitriptyline|nortriptyline|dosulepin/i.test(prescribedNames))
          notes.push({ level: 'warning', text: 'STOPP \u2014 tricyclic antidepressants inappropriate in \u226565 (anticholinergic, falls, confusion).' });
        if (/chlorphenamine|hydroxyzine|promethazine/i.test(prescribedNames))
          notes.push({ level: 'info', text: 'Sedating antihistamines \u2014 caution in \u226565 (falls, confusion).' });
      }

      /* ── Driving / occupational ── */
      if (state.occupation && /(hgv|pcv|lgv|bus|taxi|driver|lorry|plant operator|pilot|aircraft)/i.test(state.occupation)) {
        if (/morphine|codeine|tramadol|diazepam|amitriptyline|pregabalin|gabapentin/i.test(prescribedNames))
          notes.push({ level: 'warning', text: '\ud83d\ude97 DVLA \u2014 opioids, sedatives, gabapentinoids can impair driving. Patient MUST inform DVLA; document advice.' });
      }

      /* ── Drug-drug interaction quick checks ── */
      if (medsText.includes('methotrexate') && /trimethoprim/i.test(prescribedNames))
        notes.push({ level: 'critical', text: '\ud83d\udd34 Methotrexate + trimethoprim \u2014 CONTRAINDICATED (pancytopenia).' });
      if (medsText.includes('warfarin') && /fluconazole|miconazole|metronidazole|trimethoprim|amoxicillin/i.test(prescribedNames))
        notes.push({ level: 'critical', text: '\ud83d\udd34 Warfarin + this antibiotic \u2014 INR may rise. Recheck in 3\u20135 days.' });
      if (medsText.includes('ssri|sertraline|citalopram|fluoxetine|paroxetine') && /tramadol/i.test(prescribedNames))
        notes.push({ level: 'warning', text: 'SSRI + tramadol \u2014 serotonin syndrome risk; consider codeine/paracetamol instead.' });
      if (medsText.includes('maoi') && /(sertraline|citalopram|fluoxetine|paroxetine|tramadol|pethidine|dextromethorphan)/i.test(prescribedNames))
        notes.push({ level: 'critical', text: '\ud83d\udd34 MAOI interaction \u2014 life-threatening serotonin syndrome. 2-week washout required.' });
      if (medsText.includes('simvastatin') && /amiodarone|amlodipine|verapamil|diltiazem/i.test(prescribedNames))
        notes.push({ level: 'warning', text: 'Simvastatin + amiodarone/CCB \u2014 max 20 mg simvastatin. Consider atorvastatin.' });
      if (medsText.includes('doac|apixaban|rivaroxaban|dabigatran|edoxaban') && /rifampicin|phenytoin|carbamazepine|st john/i.test(prescribedNames))
        notes.push({ level: 'critical', text: '\ud83d\udd34 DOAC + enzyme inducer \u2014 reduced anticoagulant effect. Avoid combination.' });
      if (medsText.includes('lithium') && /ibuprofen|naproxen|nsaid|acei|thiazide/i.test(prescribedNames))
        notes.push({ level: 'critical', text: '\ud83d\udd34 Lithium + NSAID/ACEi/thiazide \u2014 lithium toxicity risk. Monitor levels or avoid.' });

      return notes;
    }
  }

  /* ─── Referral Engine ─── */
  class ReferralEngine {
    evaluate(pathwayKey, answers, assessment, ctx) {
      const referrals = [];
      const add = (specialty, urgency, reason) => referrals.push({ specialty, urgency, reason });

      const rules = global.GP_REFERRAL_RULES?.[pathwayKey];
      if (rules) {
        const r = rules(answers, ctx, assessment);
        if (r) referrals.push(r);
      }

      if (assessment?.urgent) {
        const globalUrgent = this.globalRedFlags(pathwayKey, answers, assessment, ctx);
        globalUrgent.forEach(r => {
          if (!referrals.some(x => x.specialty === r.specialty && x.urgency === r.urgency)) referrals.push(r);
        });
      }

      const reportRefs = this.reportBasedReferrals(ctx.parsedReports);
      reportRefs.forEach(r => {
        if (!referrals.some(x => x.reason === r.reason)) referrals.push(r);
      });

      return referrals.length ? referrals : null;
    }

    globalRedFlags(pathwayKey, a, assessment, ctx) {
      const r = [];
      const dx = (assessment?.primary || '').toLowerCase();

      if (a.cauda === 'Yes' || dx.includes('cauda equina'))
        r.push({ specialty: 'Neurosurgery / Spinal Surgery', urgency: 'Emergency', reason: 'Cauda equina syndrome — emergency MRI and surgical decompression within 24h' });
      if (dx.includes('coronary') || dx.includes('acs') || (pathwayKey === 'chest_pain' && a.character?.includes('Heavy')))
        r.push({ specialty: 'Cardiology / Emergency Medicine (A&E)', urgency: 'Emergency', reason: 'Suspected acute coronary syndrome — immediate ED assessment and ECG' });
      if (a.thunder === 'Yes' || (dx.includes('subarachnoid') || dx.includes('sah')))
        r.push({ specialty: 'Neurology / Emergency Medicine', urgency: 'Emergency', reason: 'Thunderclap headache — exclude subarachnoid haemorrhage urgently' });
      if (a.meningism === 'Yes' || dx.includes('meningitis'))
        r.push({ specialty: 'Emergency Medicine / Infectious Diseases', urgency: 'Emergency', reason: 'Meningism — urgent hospital assessment' });
      if (a.angio === 'Yes' && pathwayKey === 'urticaria')
        r.push({ specialty: 'Emergency Medicine', urgency: 'Emergency', reason: 'Anaphylaxis/angioedema — IM adrenaline and emergency care' });
      if (a.self_harm === 'Active now')
        r.push({ specialty: 'Psychiatry / Crisis Team', urgency: 'Same-day', reason: 'Active suicidal ideation — same-day mental health crisis assessment' });
      if (a.vision === 'Yes' && pathwayKey === 'conjunctivitis')
        r.push({ specialty: 'Ophthalmology', urgency: 'Same-day', reason: 'Red flag eye — reduced vision requires same-day ophthalmology review' });
      if (a.contact_lens === 'Yes' && pathwayKey === 'conjunctivitis')
        r.push({ specialty: 'Ophthalmology', urgency: 'Same-day', reason: 'Contact lens wearer with red eye — exclude keratitis same day' });
      if (a.alarm === 'Yes' && (pathwayKey === 'gord' || pathwayKey === 'ibs'))
        r.push({ specialty: 'Gastroenterology', urgency: '2WW', reason: 'Alarm GI symptoms — urgent referral to exclude malignancy (NICE NG12)' });
      if (a.severity?.includes('Severe') && pathwayKey === 'acne')
        r.push({ specialty: 'Dermatology', urgency: 'Routine', reason: 'Severe/nodular acne — dermatology for isotretinoin consideration (NICE CKS)' });
      if (a.scarring === 'Yes' && pathwayKey === 'acne')
        r.push({ specialty: 'Dermatology', urgency: 'Routine', reason: 'Acne with scarring — specialist referral for scar prevention and isotretinoin pathway' });
      if (pathwayKey === 'back_pain' && a.leg === 'Yes' && a.cauda !== 'Yes' && parseInt(ctx.age) > 0)
        r.push({ specialty: 'Physiotherapy / MSK (Spine)', urgency: 'Routine', reason: 'Sciatica not resolving — physiotherapy and consider MRI if persistent >6 weeks with red flags absent' });
      if (pathwayKey === 'sti' && (a.symptoms?.includes('Rash/palms') || a.symptoms?.includes('Genital ulcer')))
        r.push({ specialty: 'Genitourinary Medicine (GUM)', urgency: 'Urgent', reason: 'Complex STI presentation — GUM specialist assessment and partner notification' });
      if (pathwayKey === 'fungal_skin' && (a.site === 'Scalp' || a.site === 'Nails'))
        r.push({ specialty: 'Dermatology', urgency: 'Routine', reason: 'Tinea capitis/onychomycosis — confirm diagnosis; oral antifungal monitoring' });
      if (pathwayKey === 'urticaria' && a.duration === 'No — fixed >24h')
        r.push({ specialty: 'Dermatology / Rheumatology', urgency: 'Urgent', reason: 'Fixed urticarial lesions >24h — exclude urticarial vasculitis' });
      if (pathwayKey === 'thyroid' && a.direction?.includes('Thyroid lump'))
        r.push({ specialty: 'Endocrinology / ENT (Thyroid)', urgency: 'Urgent', reason: 'Thyroid nodule — USS and FNAC per NICE NG12 pathway' });
      if (pathwayKey === 'menopause' && a.risk === 'Yes')
        r.push({ specialty: 'Gynaecology / Menopause Specialist', urgency: 'Routine', reason: 'HRT contraindicated — specialist menopause clinic for alternative management' });
      if (pathwayKey === 'asthma_exac' && (a.speak !== 'Yes' || a.sob === 'Yes'))
        r.push({ specialty: 'Emergency Medicine / Respiratory', urgency: 'Emergency', reason: 'Life-threatening asthma — emergency nebulisation and assessment' });
      if (pathwayKey === 'copd_exac' && a.confusion === 'Yes')
        r.push({ specialty: 'Respiratory / Acute Medicine', urgency: 'Emergency', reason: 'COPD with confusion — hypercapnia; hospital assessment' });
      if (pathwayKey === 'otitis' && ctx.complaint?.toLowerCase().includes('facial'))
        r.push({ specialty: 'ENT', urgency: 'Urgent', reason: 'Facial weakness with ear disease — exclude Ramsay Hunt / mastoid pathology' });

      return r;
    }

    reportBasedReferrals(reports) {
      if (!reports?.length) return [];
      const refs = [];
      for (const rep of reports) {
        for (const alert of (rep.radiology?.alerts || [])) {
          if (/malignan|suspicious|neoplas|carcinoma/i.test(alert))
            refs.push({ specialty: 'Oncology / relevant surgical specialty', urgency: '2WW', reason: `Imaging alert: ${alert}` });
          if (/appendicitis/i.test(alert))
            refs.push({ specialty: 'General Surgery', urgency: 'Same-day', reason: 'Imaging suggests appendicitis — surgical review' });
          if (/pulmonary embol/i.test(alert))
            refs.push({ specialty: 'Respiratory / Haematology', urgency: 'Emergency', reason: 'PE on imaging — emergency anticoagulation assessment' });
          if (/intracranial haemorrhage|subarachnoid/i.test(alert))
            refs.push({ specialty: 'Neurosurgery / Neurology', urgency: 'Emergency', reason: 'Intracranial haemorrhage on imaging' });
          if (/cord compression|cauda/i.test(alert))
            refs.push({ specialty: 'Neurosurgery / Spinal Surgery', urgency: 'Emergency', reason: 'Spinal cord compression on MRI' });
        }
        if (rep.labs?.psa?.value > 4)
          refs.push({ specialty: 'Urology', urgency: 'Urgent', reason: `Elevated PSA (${rep.labs.psa.value}) — urology assessment per NICE NG12` });
        if (rep.flags?.includes('egfr_low') || (rep.labs?.egfr?.value && rep.labs.egfr.value < 30))
          refs.push({ specialty: 'Nephrology', urgency: 'Routine', reason: 'eGFR <30 — nephrology referral for CKD management' });
      }
      return refs;
    }
  }

  /* ─── Drug Etiology Engine ──────────────────────────────────────────────
     Answers: "could the user's CURRENT medication be CAUSING the presenting complaint?"
     This is the missing layer between DrugInteractionChecker (which only checks
     prescribed-vs-current against allergies/comorbidities) and the pathway engine
     (which only looks at the complaint text). Without this layer, drug-induced
     conditions such as SSRI-induced bruxism, statin myopathy, ACE-i cough, etc.
     are invisible to the system.

  class DrugEtiologyEngine {

         - effect: the diagnostic label

          drugClass: 'SSRI / SNRI / mirtazapine',

    /* Public API: returns sorted array of {drug, drugClass, effect, mechanism, advice, confidence, matchedKeyword} */
    check(state) {
      const findings = [];
      const medicationList = (state.medications || '') + '; ' + (state.recentMedication || '');
      const meds = medicationList.toLowerCase();
      const complaint = (state.complaint || '').toLowerCase();
      const historyAnswers = state.historyAnswers || {};
      const historyText = Object.values(historyAnswers).join(' ').toLowerCase();
      const allText = complaint + ' ' + historyText;

      if (!allText.trim()) return findings;

      for (const rule of this.rules) {
        /* match drug against the full medication list including recent */
        const m = meds.match(rule.drugPattern);
        if (!m) continue;
        const drug = m[0];

        for (const eff of (rule.effects || [])) {
          const matchedKw = eff.triggerKeywords.find(kw => allText.includes(kw));
          if (matchedKw) {
            findings.push({
              drug,
              drugClass: rule.drugClass,
              effect: eff.effect,
              mechanism: eff.mechanism,
              advice: eff.advice,
              confidence: eff.confidence,
              matchedKeyword: matchedKw
            });
          }
        }
      }
      /* general recent-medication flag — even if no rule matched */
      const recentDrug = (state.recentMedication || '').trim();
      const recentDays = parseInt(state.recentMedicationDays, 10);
      if (recentDrug) {
        const complaintDays = parseFloat(state.duration) || 0;
        const temporalMatch = recentDays > 0 && complaintDays > 0 && recentDays <= complaintDays + 7;
        const knownSideEffect = findings.some(f => f.drug.toLowerCase() === recentDrug.toLowerCase());
        if (!knownSideEffect) {
          findings.push({
            drug: recentDrug,
            drugClass: 'Recently started medication',
            effect: 'Possible adverse effect — temporal association',
            mechanism: 'Temporal relationship matches — this medication should be suspected.',
            advice: 'Consider stopping the medication (if safe) or switching to an alternative. Report to your prescriber.',
            confidence: temporalMatch ? 0.6 : 0.3,
            matchedKeyword: recentDrug
          });
        }
      }
      /* sort highest confidence first */
      findings.sort((a, b) => b.confidence - a.confidence);
      return findings;
    }
  }

    _hasWord(text, term) {
      return new RegExp('\\b' + term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '\\b', 'i').test(text);
    }

    expandText(text) {
      let t = text.toLowerCase();
      /* Forward: if synonym appears (whole-word match), add stem */
      for (const [stem, syns] of Object.entries(SYNONYMS)) {
        for (const s of syns) if (this._hasWord(t, s)) t += ' ' + stem;

      /* Reverse: if stem appears (whole-word match), add all its synonyms */
      for (const [stem, syns] of Object.entries(SYNONYMS)) {
        if (this._hasWord(t, stem)) {
          for (const s of syns) {
            if (!this._hasWord(t, s)) t += ' ' + s;
          }
        }
      }
      return t;
    }

    scorePathways(complaint, state) {
      const text = this.expandText(complaint);
      const scores = [];
      const list = global.GP_PATHWAY_LIST || [];
      for (const item of list) {
        if (item.key === 'default') continue;
        let score = 0;
        for (const kw of item.keywords) {
          if (text.includes(kw.toLowerCase())) score += kw.length + (kw.split(' ').length > 1 ? 3 : 0);
        }
        /* Cap per-pathway score to prevent long keywords from overwhelming clinical judgment */
        score = Math.min(score, 25);
        /* Exclusion scoring: subtract points if exclude keywords appear */
        for (const ex of item.exclude) {
          if (text.includes(ex.toLowerCase())) score -= 8;
        }
        /* Comorbidity boost: if patient's comorbidities match pathway category, add boost */
        if (state && score > 0) {
          const allConds = [...(state.comorbidities || []), ...(state.customComorbidities || [])].filter(c => c !== 'None');
          const catLower = (item.category || '').toLowerCase();
          const boostMap = {
            'cardiovascular': ['hypertension', 'ischaemic heart', 'atrial fibrillation', 'heart failure', 'hyperlipidaemia'],
            'respiratory': ['asthma', 'copd', 'bronchiectasis'],
            'dermatology': ['eczema', 'psoriasis', 'chronic urticaria'],
            'gastroenterology': ['gord', 'ibs', 'crohn', 'colitis', 'coeliac'],
            'mental health': ['depression', 'anxiety', 'bipolar', 'schizophrenia'],
            'endocrine': ['diabetes', 'hypothyroid', 'hyperthyroid'],
            'genitourinary': ['recurrent uti', 'bph', 'ckd', 'incontinence'],
            'musculoskeletal': ['osteoarthritis', 'rheumatoid', 'fibromyalgia'],
            'neurology': ['migraine', 'epilepsy', 'parkinson', 'dementia']
          };
          for (const [cat, conds] of Object.entries(boostMap)) {
            if (catLower.includes(cat)) {
              for (const c of conds) {
                if (allConds.some(ac => ac.toLowerCase().includes(c))) { score += 5; break; }
              }
            }
          }
        }
        if (score > 0) scores.push({ key: item.key, score, category: item.category, priority: item.priority, tier: item.tier });
      }
      /* Triage: sort by score desc, then by urgency tier asc (lower = more urgent) */
      scores.sort((a, b) => b.score - a.score || a.tier - b.tier);
      return scores;
    }

    detectPathway(complaint, imageAnalysis, state) {
      const scores = this.scorePathways(complaint, state);
      if (imageAnalysis?.features?.redness > 25) {
        const derm = scores.find(s => ['dermatitis_eczema', 'cellulitis', 'urticaria', 'fungal_skin', 'acne', 'cold_sore', 'lyme'].includes(s.key));
        if (!derm) scores.unshift({ key: 'dermatitis_eczema', score: 50, category: 'Dermatology', priority: 'routine', tier: 3 });
      }
      /* Pre-assess: if complaint mentions radiation + arm/jaw/back + chest — override to ACS pathway */
      const cText = (complaint || '').toLowerCase();
      if ((cText.includes('radiat') || cText.includes('radiating')) &&
          (cText.includes('arm') || cText.includes('jaw') || cText.includes('back') || cText.includes('shoulder')) &&
          (cText.includes('chest') || cText.includes('heart'))) {
        const acsIdx = scores.findIndex(s => s.key === 'chest_pain');
        if (acsIdx >= 0) scores[acsIdx].score = Math.max(scores[acsIdx].score, 20);
        else scores.unshift({ key: 'chest_pain', score: 20, category: 'Cardiovascular', priority: 'emergency', tier: 0 });
      }
      /* Pre-assess: contact dermatitis — if complaint mentions new soap/detergent/lotion */
      if ((cText.includes('new soap') || cText.includes('new detergent') || cText.includes('new lotion') ||
           cText.includes('new cream') || cText.includes('after using') || cText.includes('new perfume') ||
           cText.includes('new shampoo') || cText.includes('new jewellery') || cText.includes('new metal')) &&
          (cText.includes('rash') || cText.includes('itch') || cText.includes('red') || cText.includes('skin') ||
           cText.includes('dermatitis') || cText.includes('eczema'))) {
        const dermIdx = scores.findIndex(s => s.key === 'dermatitis_eczema');
        if (dermIdx >= 0) scores[dermIdx].score = Math.max(scores[dermIdx].score, 25);
        else scores.unshift({ key: 'dermatitis_eczema', score: 25, category: 'Dermatology', priority: 'routine', tier: 3 });
      }
      /* Triage re-sort after all overrides: score desc, then urgency tier asc */
      scores.sort((a, b) => b.score - a.score || a.tier - b.tier);
      return scores[0]?.key || 'default';
    }

    async analyzeImage(file) {
      if (!file) return null;
      try {
        return await this.imageAnalyzer.analyze(file);
      } catch (e) {
        return { error: e.message, summary: 'Could not analyse image — please describe rash in text.' };
      }
    }

    async parseReports(files, manualLabs, pastedText) {
      const parsed = [];
      for (const f of files || []) {
        try { parsed.push(await this.reportParser.parseFile(f)); } catch { /* skip */ }
      }
      if (pastedText?.trim()) parsed.push(this.reportParser.parseText(pastedText, 'pasted-report.txt'));
      if (manualLabs && Object.keys(manualLabs).length) {
        const manualText = Object.entries(manualLabs).map(([k, v]) => `${k}: ${v}`).join('\n');
        parsed.push(this.reportParser.parseText(manualText, 'manual-entry'));
      }
      return parsed;
    }

    refineDiagnosis(pathway, answers, imageAnalysis, parsedReports, state) {
      const p = global.GP_PATHWAYS[pathway] || global.GP_PATHWAYS.default;
      let dx = p.assess(answers, imageAnalysis, state);

      /* Drug-etiology integration — answers "is your current medication causing this?" */
      const findings = (state && state.etiologyFindings) || [];
      if (findings.length) {
        const drugLabels = findings.map(f => f.effect);
        dx.differentials = [...new Set([...drugLabels, ...(dx.differentials || [])])];
        const top = findings[0];
        /* If pathway defaulted or confidence is low AND we have a strong drug-induced cause, promote it. */
        if ((pathway === 'default' || (dx.confidence || 0) < 60) && top.confidence >= 0.7) {
          dx.primary = `${top.effect} (likely drug-induced by ${top.drug})`;
          dx.confidence = Math.max(dx.confidence || 0, Math.min(85, Math.round(top.confidence * 100)));
          dx.drugInduced = true;
          dx.causeDrug = top.drug;
        } else if (top.confidence >= 0.7) {
          /* Otherwise just flag the differential — pathway already has a strong answer. */
          dx.drugInducedSuspect = true;
          dx.causeDrug = top.drug;
        }
      }

      for (const rep of parsedReports || []) {
        if (rep.flags?.includes('uti_nitrites') || rep.flags?.includes('uti_leucocytes')) {
          if (pathway === 'uti') { dx.confidence = Math.min(95, dx.confidence + 10); dx.primary += ' — urinalysis supports infection'; }
        }
        if (rep.labs?.crp?.value > 50) dx.confidence = Math.min(95, dx.confidence + 5);
        if (rep.labs?.hb?.value && rep.labs.hb.value < 100 && pathway === 'anaemia') {
          dx.primary = `Iron deficiency anaemia likely (Hb ${rep.labs.hb.value})`;
          dx.confidence = 85;
        }
        if (rep.labs?.hba1c?.value >= 48) {
          dx.differentials = ['Type 2 diabetes mellitus', ...(dx.differentials || [])];
          if (pathway === 'diabetes') dx.confidence = 90;
        }
        for (const alert of (rep.radiology?.alerts || [])) {
          dx.differentials = [alert, ...(dx.differentials || [])];
        }
      }

      if (imageAnalysis?.differentials?.length && p.imageRelevant) {
        dx.differentials = [...new Set([...imageAnalysis.differentials, ...(dx.differentials || [])])];
        dx.confidence = Math.min(95, dx.confidence + 5);
      }

      return dx;
    }

    buildReasoningChain(state, pathwayKey, scores, imageAnalysis, parsedReports, diagnosis) {
      const chain = [];
      chain.push({ step: 'Parse', text: `Analysing presenting complaint: "${state.complaint.slice(0, 80)}${state.complaint.length > 80 ? '…' : ''}"` });
      chain.push({ step: 'Expand', text: `Expanded clinical terms via synonym thesaurus; matched ${scores.length || 1} potential pathway(s) from MRCGP-aligned curriculum database.` });
      if (scores.length) chain.push({ step: 'Match', text: `Top pathway: ${scores[0].key.replace(/_/g, ' ')} (${scores[0].category}, score ${scores[0].score})${scores[1] ? `; alternative: ${scores[1].key.replace(/_/g, ' ')}` : ''}` });
      const allConds = [...(state.comorbidities || []), ...((state.customComorbidities || []).map(c => c + ' (custom)'))].filter(c => c !== 'None');
      const ctx = `Patient context: ${formatAge(state.age)}, ${state.gender}.`;
      const condText = allConds.length ? ` ${allConds.length} co-morbid${allConds.length === 1 ? 'ity' : 'ities'} loaded — ${allConds.slice(0, 6).join(', ')}${allConds.length > 6 ? '…' : ''}.` : ' No co-morbidities recorded.';
      const allergyText = state.allergies ? ` Allergies on file: ${state.allergies}.` : '';
      const lifestyleText = (state.smoking || state.alcohol) ? ` Lifestyle: ${[state.smoking, state.alcohol].filter(Boolean).join(' / ')}.` : '';
      const occText = state.occupation ? ` Occupation: ${state.occupation}.` : '';
      chain.push({ step: 'Context', text: ctx + condText + allergyText + lifestyleText + occText });
      if (state.pregStatus) chain.push({ step: 'Preg', text: `Pregnancy/reproductive status: ${state.pregStatus} \u2014 drug selection filtered against UKTIS / BNF.` });
      if (state.familyHistory) chain.push({ step: 'FH', text: `Family history considered: ${state.familyHistory}` });
      if (imageAnalysis && !imageAnalysis.error) chain.push({ step: 'Image', text: `Image analysis: ${imageAnalysis.summary}` });
      if (parsedReports?.length) chain.push({ step: 'Reports', text: `Parsed ${parsedReports.length} report(s): ${parsedReports.map(r => r.summary).join(' | ')}` });
      /* NEW: drug-etiology step — fuses chief complaint + current meds + comorbidities to test for drug-induced causation */
      const findings = (state.etiologyFindings || []);
      if (findings.length) {
        const top = findings[0];
        chain.push({
          step: 'Etiology',
          text: `Drug-induced causation assessed: ${findings.length} potential link(s) found via DrugEtiologyEngine. Top match: ${top.drug} → ${top.effect} (${Math.round(top.confidence * 100)}% confidence; trigger keyword: "${top.matchedKeyword}"). Mechanism: ${top.mechanism.slice(0, 240)}${top.mechanism.length > 240 ? '…' : ''}`
        });
      } else {
        chain.push({ step: 'Etiology', text: 'Drug-induced causation assessed via DrugEtiologyEngine (25+ BNF/MHRA-grounded drug→adverse-effect rules) — no high-confidence match between current medication list and presenting complaint.' });
      }
      chain.push({ step: 'History', text: 'Cross-correlated focused history answers with red-flag screening (NICE CKS / NG pathways).' });
      chain.push({ step: 'Interact', text: 'Ran DrugInteractionChecker against MRCGP/BNF/STOPP-START rules \u2014 allergies, pregnancy, renal/hepatic, age, anticoagulation, driving.' });
      chain.push({ step: 'Infer', text: `Working diagnosis: ${diagnosis.primary} (${diagnosis.confidence}% confidence). Differentials considered: ${(diagnosis.differentials || []).slice(0, 5).join(', ')}.` });
      chain.push({ step: 'Safeguard', text: 'Applied GMC Good Medical Practice principles: safety-netting, red-flag detection, and appropriate referral thresholds.' });
      return chain;
    }

    async runFullAssessment(state) {
      this.reasoningChain = [];
      const scores = this.scorePathways(state.complaint, state);
      const pathwayKey = state.pathwayKey || this.detectPathway(state.complaint, state.imageAnalysis, state);
      const pathway = global.GP_PATHWAYS[pathwayKey] || global.GP_PATHWAYS.default;

      const parsedReports = await this.parseReports(
        state.reportFiles || [],
        state.manualLabs,
        state.pastedReportText
      );

      /* Drug-etiology FIRST — must be in state before refineDiagnosis and pathway.assess() read it. */
      state.etiologyFindings = this.etiologyEngine.check(state);

      const diagnosis = this.refineDiagnosis(pathwayKey, state.historyAnswers || {}, state.imageAnalysis, parsedReports, state);
      const meds = pathway.meds(state.historyAnswers || {}, state);
      const drugNotes = this.drugChecker.check(state, meds);

      const ctx = {
        age: state.age,
        gender: state.gender,
        complaint: state.complaint,
        comorbidities: state.comorbidities,
        parsedReports
      };
      const referrals = this.referralEngine.evaluate(pathwayKey, state.historyAnswers || {}, diagnosis, ctx);

      const chain = this.buildReasoningChain(state, pathwayKey, scores, state.imageAnalysis, parsedReports, diagnosis);

      return {
        pathwayKey,
        pathway,
        scores,
        diagnosis,
        meds,
        drugNotes,
        referrals,
        parsedReports,
        tests: pathway.tests || [],
        differentials: diagnosis.differentials || pathway.differentials,
        safetyNet: pathway.safetyNet,
        guideline: pathway.guideline,
        reasoningChain: chain,
        etiologyFindings: state.etiologyFindings
      };
    }
  }

  global.ReportParser = ReportParser;
  global.ImageAnalyzer = ImageAnalyzer;
  global.DrugInteractionChecker = DrugInteractionChecker;
  global.DrugEtiologyEngine = DrugEtiologyEngine;
  global.ReferralEngine = ReferralEngine;
  global.ClinicalReasoningEngine = ClinicalReasoningEngine;
})(window);

      return isNaN(n) ? '' : n;

    function formatAge(num) {
      if (num === '' || num === undefined || num === null) return '';
      const n = typeof num === 'string' ? parseFloat(num) : num;
      if (isNaN(n)) return String(num);
      const y = Math.floor(n), mo = Math.round((n - y) * 12);
      if (mo === 0) return y + ' yrs';
      if (y === 0) return mo + ' months';
      return y + ' years ' + mo + ' months';
    }

    function gpMessage(text, typing = false) {
      const body = typing
        ? '<div class="typing"><span></span><span></span><span></span></div>'
        : text;
      return `<div class="gp-avatar">
        <div class="doctor-avatar-wrap gp-msg-avatar">${DR_EVELYN_IMG}</div>
        <div><div class="name">${GP_NAME} — Your AI powered GP assistant</div><div class="message">${body}</div></div>
      </div>`;
    }

    function renderProgress() {
      document.getElementById('progressBar').innerHTML = STEPS.map((_, i) => {
        let c = 'progress-segment';
        if (i < state.step) c += ' done';
        if (i === state.step) c += ' active';
        return `<div class="${c}"></div>`;
      }).join('');
    }

    function renderReferrals(referrals) {
      if (!referrals?.length) return '';
      return referrals.map(r => {
        const urg = (r.urgency || 'Routine').replace(/\s+/g, '-');
        const cls = r.urgency === 'Routine' ? 'referral-card routine' : 'referral-card';
        return `<div class="${cls}">
          <h4><span class="urgency-badge urgency-${urg}">${esc(r.urgency)}</span>${esc(r.specialty)}</h4>
          <p style="font-size:0.86rem;color:var(--muted);margin-top:0.35rem">${esc(r.reason)}</p>
        </div>`;
      }).join('');
    }

    function renderReasoning(chain) {
      if (!chain?.length) return '';
      return `<div class="reasoning-panel"><h3 style="margin-bottom:0.65rem;font-size:0.9rem;color:var(--primary)">🧠 AI clinical reasoning</h3>
        ${chain.map(s => `<div class="reasoning-step"><span class="tag">${esc(s.step)}</span><span>${esc(s.text)}</span></div>`).join('')}
      </div>`;
    }

    async function runAnalysis() {
      state.pathwayKey = state.pathwayKey || engine.detectPathway(state.complaint, state.imageAnalysis, state);
      const result = await engine.runFullAssessment(state);
      state.analysis = result;
      state.recommendedTests = result.tests;
      state.parsedReports = result.parsedReports;
      return result;
    }

    function renderStep() {
      renderProgress();
      const fns = [renderWelcome, renderAbout, renderComplaint, renderPhoto, renderHistory,
        renderBackground, renderReview, renderInvestigations, renderAssessment];
      document.getElementById('stepContainer').innerHTML = fns[state.step]();
      attachListeners();
    }

    function renderWelcome() {
      const onlineClass = navigator.onLine ? 'badge-online' : 'badge-offline';
      const onlineText = navigator.onLine ? '🌐 Online' : '🔌 Offline';
      const aiChecked = state._aiEnabled ? 'checked' : '';
      return `<div class="card">
        ${gpMessage(`Hello! I'm ${GP_NAME}, your Personal GP assistant. I'll guide you through a structured consultation — check your photos for basic visible patterns, analyse lab reports, and suggest investigations and a management plan based on NICE CKS guidelines.`)}
        <div class="disclaimer"><strong>⚠️ Important medical disclaimer</strong>
          Educational tool only — not a substitute for a registered GP, physical examination, or emergency care.
          Chest pain, severe breathlessness, or self-harm thoughts → call <strong>1122</strong> (Rescue 1122). For suicide/self-harm: <strong>Umang Pakistan 0311-7786624</strong>.</div>
        <h2>Before we begin</h2>
        <p style="color:var(--muted);font-size:0.92rem;margin-bottom:1rem">Structured consultation: your details → complaint → optional photo → history → background → AI review → investigations → final assessment.</p>
        <div style="display:flex;flex-wrap:wrap;gap:0.5rem;margin-bottom:1.1rem;font-size:0.78rem">
          <span style="background:rgba(45,212,191,0.10);border:1px solid rgba(45,212,191,0.3);color:var(--primary);padding:0.3rem 0.65rem;border-radius:999px">📦 Single file</span>
          <span class="${onlineClass}" style="padding:0.3rem 0.65rem;border-radius:999px;border:1px solid">${onlineText}</span>
          <span style="background:rgba(45,212,191,0.10);border:1px solid rgba(45,212,191,0.3);color:var(--primary);padding:0.3rem 0.65rem;border-radius:999px">🚫 No install</span>
          <span style="background:rgba(45,212,191,0.10);border:1px solid rgba(45,212,191,0.3);color:var(--primary);padding:0.3rem 0.65rem;border-radius:999px">💾 Runs from USB / email</span>
        </div>
        <details style="margin-bottom:1rem;background:var(--surface-2);border-radius:10px;padding:0.5rem 0.75rem;border:1px solid var(--border)">
          <summary style="cursor:pointer;font-weight:600;color:var(--primary);font-size:0.88rem">🧠 AI Enhancement Settings</summary>
          <div style="margin-top:0.75rem">
            <div class="form-group"><label>GitHub Token <span class="optional">(free — github.com/settings/tokens)</span></label>
              <input type="password" id="aiApiKey" placeholder="Paste your GitHub token (ghp_...)" value="${esc(state._apiKey)}" style="font-family:monospace">
              <p style="font-size:0.75rem;color:var(--muted);margin-top:0.3rem">🔒 Stored locally in your browser only. Create a classic token with <code>repo</code> scope at github.com/settings/tokens.</p></div>
            <div class="form-group"><label class="toggle-row">
              <input type="checkbox" id="aiEnabled" ${aiChecked} style="width:auto;margin-right:0.5rem">
              <span>Enable AI-powered diagnosis (GitHub Models) alongside local pathways</span>
            </label>
            <p style="font-size:0.75rem;color:var(--muted);margin-top:0.3px">Uses GPT-4o-mini via GitHub Models for differentials, red flag analysis, and management suggestions.</p></div>
          </div>
        </details>
        <div class="btn-row"><button class="btn-primary" onclick="saveAiSettings();nextStep()">Begin consultation →</button></div>
      </div>`;
    }

    function renderAbout() {
      return `<div class="card">
        <div class="step-label">Step 1 · About you</div>
        ${gpMessage("Let's start with basic details. Your name is optional — age and gender help me ask the right questions safely.")}
        <h2>Patient details</h2>
        <div class="form-group"><label>Full name <span class="optional">(optional)</span></label>
          <input type="text" id="name" placeholder="e.g. Alex Smith" value="${esc(state.name)}"></div>
        <div class="row">
          <div class="form-group"><label>Age *</label><input type="text" id="age" inputmode="numeric" value="${esc(formatAge(state.age))}" placeholder="e.g. 19 or 19 years 5 months"></div>
          <div class="form-group"><label>Gender *</label><select id="gender">
            <option value="">Select…</option>
            ${['Female','Male','Non-binary','Prefer not to say'].map(g => `<option value="${g}" ${state.gender===g?'selected':''}>${g}</option>`).join('')}

        </div>
        <div class="btn-row"><button class="btn-secondary" onclick="prevStep()">← Back</button><button class="btn-primary" onclick="saveAbout()">Continue →</button></div>
      </div>`;
    }

    function renderComplaint() {
      return `<div class="card">
        <div class="step-label">Step 2 · Presenting complaint</div>
        ${gpMessage("Tell me what's brought you in — use your own words, just as you would with your GP.")}

          <div class="form-group"><label>Duration</label><input type="number" id="duration" min="1" value="${esc(state.duration)}" placeholder="Number"></div>

        <div class="btn-row"><button class="btn-secondary" onclick="prevStep()">← Back</button><button class="btn-primary" onclick="saveComplaint()">Continue →</button></div>
      </div>`;
    }

    function renderPhoto() {
      const imgBlock = state.complaintImageUrl
        ? `<img src="${state.complaintImageUrl}" class="image-preview" alt="Complaint photo">`
        : '';
      const analysisBlock = state.imageAnalysis && !state.imageAnalysis.error
        ? `<div class="image-analysis-box"><strong>AI image analysis:</strong> ${esc(state.imageAnalysis.summary)}
          ${state.imageAnalysis.differentials?.length ? `<br><span style="color:var(--muted)">Visual differentials: ${state.imageAnalysis.differentials.slice(0,3).map(esc).join(', ')}</span>` : ''}</div>`
        : '';
      return `<div class="card">
        <div class="step-label">Step 3 · Photo of complaint (optional)</div>

        <label class="upload-zone ${state.complaintImage?'has-file':''}" id="photoZone">
